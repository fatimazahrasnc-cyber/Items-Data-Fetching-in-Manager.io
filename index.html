<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventory Items — Full Quantity View</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #f4f6f9;
  --surface:   #ffffff;
  --border:    #dde2ea;
  --border2:   #c8d0dc;
  --accent:    #1d6fce;
  --accent-lt: #e8f1fb;
  --green:     #1a7f37;
  --green-lt:  #e6f4ea;
  --red:       #cf222e;
  --red-lt:    #ffeef0;
  --amber:     #9a6700;
  --amber-lt:  #fff8c5;
  --purple:    #6639ba;
  --purple-lt: #ede8ff;
  --teal:      #0e7490;
  --teal-lt:   #e0f2f7;
  --muted:     #8391a4;
  --text:      #1c2635;
  --text-dim:  #57657a;
  --head:      #0d1b2a;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Plus Jakarta Sans', system-ui, sans-serif;
  --radius:    8px;
  --shadow:    0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
}
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 14px; font-size: 13px; }

/* ── Topbar ── */
.topbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 9px 14px; margin-bottom: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  position: sticky; top: 0; z-index: 200;
}
.brand { font-size: 13px; font-weight: 800; color: var(--accent); letter-spacing: .03em; white-space: nowrap; }
.vsep  { width: 1px; height: 20px; background: var(--border2); flex-shrink: 0; }
.load-btn {
  padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-family: var(--sans); font-size: 12px; font-weight: 700;
  background: var(--accent); color: #fff; transition: opacity .15s, transform .1s; white-space: nowrap;
}
.load-btn:hover:not(:disabled) { opacity: .87; transform: translateY(-1px); }
.load-btn:disabled { opacity: .42; cursor: not-allowed; }
.qty-btn {
  padding: 7px 14px; border: 1px solid #0e7490; border-radius: 6px;
  background: var(--teal-lt); color: var(--teal); font-family: var(--sans);
  font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all .15s;
}
.qty-btn:hover:not(:disabled) { background: #c5eaf2; }
.qty-btn:disabled { opacity: .42; cursor: not-allowed; }
.sec-btn {
  padding: 7px 12px; border: 1px solid var(--border2); border-radius: 6px;
  background: transparent; color: var(--text-dim); font-family: var(--sans);
  font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s;
}
.sec-btn:hover { background: var(--bg); }
.search-wrap { position: relative; min-width: 140px; max-width: 240px; flex: 1; }
.search-wrap input {
  width: 100%; padding: 6px 10px 6px 28px; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 11px; outline: none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.si { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--muted); pointer-events: none; }
.ctrl-sel {
  padding: 6px 8px; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: var(--sans); font-size: 11px; outline: none; cursor: pointer;
}
.fbtn {
  padding: 5px 10px; border: 1px solid var(--border2); border-radius: 6px;
  background: transparent; color: var(--text-dim); font-family: var(--sans);
  font-size: 11px; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.fbtn.on { background: var(--accent-lt); color: var(--accent); border-color: #90bdf0; font-weight: 700; }
.prog-wrap { flex: 1; min-width: 60px; max-width: 140px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-bar  { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width .15s; }
.status-txt { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }

/* ── Qty loading progress panel ── */
.qty-progress-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 16px 20px; margin-bottom: 12px;
}
.qpp-title { font-size: 12px; font-weight: 700; color: var(--head); margin-bottom: 10px; }
.qpp-bar-wrap { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.qpp-bar { height: 100%; width: 0%; background: var(--teal); border-radius: 4px; transition: width .2s; }
.qpp-stats { display: flex; gap: 20px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
.qpp-stat-val { color: var(--head); font-weight: 600; }
.qpp-cancel {
  margin-top: 10px; padding: 5px 12px; border: 1px solid var(--red); border-radius: 5px;
  background: var(--red-lt); color: var(--red); font-family: var(--sans); font-size: 11px;
  cursor: pointer; transition: all .15s;
}
.qpp-cancel:hover { background: #ffd4d4; }

/* ── Info bar ── */
.info-bar {
  padding: 8px 14px; border-radius: var(--radius); margin-bottom: 10px;
  font-size: 11px; font-family: var(--mono); border: 1px solid;
}
.info-bar.ok   { background: var(--green-lt); color: var(--green); border-color: #aaddb8; }
.info-bar.warn { background: var(--amber-lt); color: var(--amber); border-color: #e8d060; }
.info-bar.teal { background: var(--teal-lt);  color: var(--teal);  border-color: #9ad8e8; }

/* ── Debug panel ── */
.debug-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px;
  font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  max-height: 200px; overflow-y: auto;
}
.debug-panel h4 { font-size: 11px; color: var(--head); margin-bottom: 8px; font-family: var(--sans); }
.debug-ok  { color: var(--green); }
.debug-err { color: var(--red); }
.debug-dim { color: var(--muted); }

/* ── Stats ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 9px; margin-bottom: 12px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; box-shadow: var(--shadow); }
.stat-label { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 3px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--head); line-height: 1; }
.stat-sub   { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ── Tabs ── */
.tab-bar { display: flex; gap: 2px; border-bottom: 2px solid var(--border); }
.tab {
  padding: 8px 15px; font-size: 11px; font-weight: 700; cursor: pointer;
  color: var(--text-dim); border-radius: 6px 6px 0 0; transition: all .15s; white-space: nowrap;
  border: 1px solid transparent; border-bottom: none; margin-bottom: -2px;
}
.tab:hover { color: var(--accent); }
.tab.active { background: var(--surface); color: var(--accent); border-color: var(--border); border-bottom-color: var(--surface); }

/* ── Table ── */
.tbl-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px;
}
.tbl-scroll { overflow-x: auto; max-height: calc(100vh - 320px); overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead { position: sticky; top: 0; z-index: 10; }
thead tr.cg-row { background: #edf1f7; }
th.cg {
  padding: 4px 10px 3px; font-size: 8px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .14em; text-align: center;
  border-bottom: 1px solid var(--border); border-right: 1px solid var(--border2);
}
th.cg:last-child { border-right: none; }
.cg-id   { color: #4a5a6e; }
.cg-qty  { color: #0e7490; background: #e0f6fb; }
.cg-val  { color: #1a7f37; background: #e6f4ea; }
.cg-pri  { color: #7a4f00; background: #fef9e7; }
.cg-div  { color: #6639ba; background: #ede8ff; }
.cg-cf   { color: #9a6700; background: #fff8c5; }
.cg-misc { color: #4a5a6e; }
thead tr.hdr-row { background: #f6f8fb; }
th {
  padding: 8px 10px; text-align: left;
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: .07em;
  border-bottom: 2px solid var(--border2); border-right: 1px solid #edf1f7;
  white-space: nowrap; user-select: none; transition: color .15s;
}
th:last-child { border-right: none; }
th.r { text-align: right; }
th.c { text-align: center; }
tbody tr { border-bottom: 1px solid #edf1f7; transition: background .08s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f3f7ff; }
td { padding: 7px 10px; vertical-align: middle; border-right: 1px solid #f0f3f7; }
td:last-child { border-right: none; }
.td-name { font-weight: 600; color: var(--head); max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.td-code { font-family: var(--mono); font-size: 10px; color: var(--accent); white-space: nowrap; }
.td-unit { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.td-num  { font-family: var(--mono); font-size: 11px; text-align: right; white-space: nowrap; }
.td-dim  { color: #c0ccda; }
.neg     { color: var(--red) !important; }
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 20px;
  font-size: 9px; font-weight: 700; letter-spacing: .04em; white-space: nowrap;
}
.b-active   { background: var(--green-lt); color: var(--green); border: 1px solid #aaddb8; }
.b-inactive { background: var(--red-lt);   color: var(--red);   border: 1px solid #ffbbbc; }
.b-val      { background: var(--accent-lt);color: var(--accent);border: 1px solid #a8ccf0; }
.b-reorder  { background: var(--amber-lt); color: var(--amber); border: 1px solid #e8d060; }
.grp-row td {
  background: #eef2f9; font-size: 9px; font-weight: 800;
  color: var(--accent); text-transform: uppercase; letter-spacing: .16em;
  padding: 4px 10px; border-top: 1px solid var(--border2);
}
.div-chip {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 10px; background: var(--purple-lt); color: var(--purple);
  border: 1px solid #c4aef5; white-space: nowrap;
}
.div-code { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-left: 4px; }
.cf-cell  { font-family: var(--mono); font-size: 10px; color: var(--text); }
tfoot tr td {
  background: #f0f4f9; font-weight: 700; border-top: 2px solid var(--border2);
  padding: 7px 10px; font-family: var(--mono); font-size: 11px;
}
.err-box { color: var(--red); background: var(--red-lt); border: 1px solid #ffbbbc; border-radius: var(--radius); padding: 12px 16px; font-size: 12px; margin-bottom: 14px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
.empty-state .icon { font-size: 38px; margin-bottom: 10px; }
.pagination {
  display: flex; align-items: center; justify-content: flex-end; gap: 5px;
  padding: 9px 13px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); flex-wrap: wrap; background: #fafbfd;
}
.pg-btn {
  padding: 4px 9px; border: 1px solid var(--border2); border-radius: 5px;
  background: var(--surface); color: var(--text-dim);
  font-family: var(--sans); font-size: 11px; cursor: pointer; transition: all .15s;
}
.pg-btn:hover:not(:disabled) { background: var(--accent-lt); color: var(--accent); border-color: var(--accent); }
.pg-btn:disabled { opacity: .3; cursor: not-allowed; }
.pg-btn.cur { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
.pg-dots { color: var(--muted); }

@media print {
  .topbar, .tab-bar, .pagination, .stats-grid, .qty-progress-panel, .info-bar, .debug-panel, .sec-btn, .qty-btn { display: none !important; }
  .tbl-wrap { box-shadow: none; border-radius: 0; border: none; }
  .tbl-scroll { max-height: none; overflow: visible; }
  table { font-size: 9px; } th, td { padding: 5px 7px; }
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">📦 Inventory + Quantities</span>
  <div class="vsep"></div>
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load Items</button>
  <button class="qty-btn"  id="qty-btn"  onclick="loadQuantities()" disabled>⚖ Load Quantities</button>
  <button class="sec-btn"  onclick="window.print()">🖨 Print</button>
  <button class="sec-btn"  id="dbg-btn"  onclick="toggleDebug()" disabled style="display:none">🔍 Debug</button>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search-input" placeholder="Search name / code…" oninput="applyFilters()" disabled>
  </div>
  <select class="ctrl-sel" id="sort-select" onchange="applyFilters()" disabled>
    <option value="name-asc">Name A→Z</option>
    <option value="name-desc">Name Z→A</option>
    <option value="code-asc">Code A→Z</option>
    <option value="qty-hand-desc">Qty On Hand ↓</option>
    <option value="qty-owned-desc">Qty Owned ↓</option>
    <option value="val-desc">Total Value ↓</option>
    <option value="sale-desc">Sale Price ↓</option>
  </select>
  <button class="fbtn" id="f-active"  onclick="toggleF('active')"  disabled>Active Only</button>
  <button class="fbtn" id="f-reorder" onclick="toggleF('reorder')" disabled>Reorder</button>
  <button class="fbtn" id="f-hasdiv"  onclick="toggleF('hasdiv')"  disabled>Has Division</button>
  <button class="fbtn" id="f-negqty"  onclick="toggleF('negqty')"  disabled>Negative Qty</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load Items to begin</span>
</div>

<div id="info-bar-wrap"></div>
<div id="qty-panel-wrap"></div>
<div id="debug-wrap" style="display:none"></div>
<div class="stats-grid" id="stats-grid" style="display:none"></div>

<div id="tabs-container" style="display:none">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('inventory')">📊 Inventory &amp; Quantities</div>
    <div class="tab" onclick="switchTab('pricing')">💰 Pricing &amp; Valuation</div>
    <div class="tab" onclick="switchTab('divisions')">🏢 Divisions &amp; Accounts</div>
    <div class="tab" onclick="switchTab('customfields')">🏷 Custom Fields</div>
    <div class="tab" onclick="switchTab('all')">⚙ All Fields</div>
  </div>
  <div id="app"></div>
</div>
<div id="app-init"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getInventoryItemBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
   Manager.io returns ≤50 records per call.
   This loop follows next_page_token until
   every record is loaded.
══════════════════════════════════ */
async function getInventoryItemBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/inventory-item-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/inventory-item-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Generic paginated fetcher
══════════════════════════════════ */
async function fetchAllPages(path) {
  const all = [];
  let nextToken = null;
  let pageNum = 0;
  do {
    const sep = path.includes('?') ? '&' : '?';
    const url = nextToken ? `${path}${sep}next_page_token=${encodeURIComponent(nextToken)}` : path;
    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path: url });
    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    all.push(...page);
    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;
    pageNum++;
    if (pageNum >= 500) break;
  } while (nextToken);
  return all;
}

/* ══════════════════════════════════
   State
══════════════════════════════════ */
let _raw      = [];
let _filtered = [];
let _page     = 1;
let _tab      = 'inventory';
const PAGE_SIZE = 50;
const _filters  = { active: false, reorder: false, hasdiv: false, negqty: false };
let _cancelQtyLoad = false;
let _qtyLoaded  = 0;
let _debugLog   = [];

let _cfKeyToName  = {};
let _divKeyToInfo = {};

const VALUATION = { 1: 'Average Cost', 2: 'FIFO', 3: 'LIFO', 4: 'Specific ID' };

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const num = (v, d=0) => v!=null ? Number(v).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}) : null;

function numCell(v, d=2, greenPos=false) {
  if (v === null || v === undefined) return `<span class="td-dim">—</span>`;
  const n = Number(v);
  const f = num(n, d);
  if (n < 0) return `<span class="neg">${f}</span>`;
  if (greenPos && n > 0) return `<span style="color:var(--green);font-weight:600">${f}</span>`;
  return f;
}

function showInfo(msg, type='ok') {
  document.getElementById('info-bar-wrap').innerHTML =
    `<div class="info-bar ${type}">${esc(msg)}</div>`;
}

function resolveDiv(val) {
  if (!val) return null;
  if (typeof val === 'string') return _divKeyToInfo[val] ?? _divKeyToInfo[val.toLowerCase()] ?? { name: val, code: null };
  if (typeof val === 'object') {
    const k = val.key ?? val.id ?? '';
    return _divKeyToInfo[k] ?? _divKeyToInfo[k.toLowerCase?.()] ?? { name: val.name ?? val.text ?? k, code: val.code ?? null };
  }
  return null;
}

function cfLabel(key) {
  return _cfKeyToName[key] ?? _cfKeyToName[key?.toLowerCase()] ?? key;
}

/* ══════════════════════════════════
   EXTRACT QTY from item detail response
   
   The individual item endpoint returns the full
   item object. We scan ALL fields for anything
   that looks like a quantity or value field,
   log what we find for debugging.
══════════════════════════════════ */
function extractQtyFromDetail(data, itemKey) {
  // The response could be the item directly or wrapped
  const src = data?.item ?? data ?? {};

  // Collect all numeric fields for debugging
  const allNumericFields = {};
  function scanObj(obj, prefix='') {
    if (!obj || typeof obj !== 'object') return;
    Object.entries(obj).forEach(([k, v]) => {
      const fullKey = prefix ? `${prefix}.${k}` : k;
      if (typeof v === 'number') allNumericFields[fullKey] = v;
      else if (v && typeof v === 'object' && !Array.isArray(v)) scanObj(v, fullKey);
    });
  }
  scanObj(src);

  // Also check _links for any quantity-related sub-resources
  const links = data?._links ?? src?._links ?? {};

  // Direct qty fields — Manager uses these in item detail view
  const qtyOwned     = src?.qtyOwned      ?? src?.quantityOwned      ?? src?.owned         ?? null;
  const qtyOnHand    = src?.qtyOnHand     ?? src?.quantityOnHand     ?? src?.inStock        ??
                       src?.stock         ?? src?.balance             ?? null;
  const qtyToDeliver = src?.qtyToDeliver  ?? src?.quantityToDeliver  ?? src?.committed      ??
                       src?.toDeliver     ?? null;
  const qtyToReceive = src?.qtyToReceive  ?? src?.quantityToReceive  ?? src?.onOrder        ??
                       src?.toReceive     ?? null;
  const averageCost  = src?.averageCost   ?? src?.averageUnitCost    ?? src?.unitCost       ??
                       src?.avgCost       ?? null;
  const totalValue   = src?.totalValue    ?? src?.inventoryValue     ?? src?.value          ??
                       src?.amount        ?? null;

  return {
    qtyOwned, qtyOnHand, qtyToDeliver, qtyToReceive, averageCost, totalValue,
    _allFields: allNumericFields,
    _links: Object.keys(links),
    _rawKeys: Object.keys(src),
  };
}

/* ══════════════════════════════════
   fetchMetadata — CF names + divisions
══════════════════════════════════ */
async function fetchMetadata() {
  const cfEndpoints = [
    '/api4/text-custom-field-batch', '/api4/number-custom-field-batch',
    '/api4/date-custom-field-batch', '/api4/checkbox-custom-field-batch',
    '/api4/dropdown-custom-field-batch',
  ];
  const results = await Promise.allSettled(cfEndpoints.map(ep => fetchAllPages(ep)));
  results.forEach(r => {
    if (r.status !== 'fulfilled') return;
    r.value.forEach(row => {
      const key = row?.key, name = row?.item?.name ?? row?.name;
      if (key && name) { _cfKeyToName[key] = name; _cfKeyToName[key.toLowerCase()] = name; }
    });
  });
  try {
    const divRows = await fetchAllPages('/api4/division-batch');
    divRows.forEach(row => {
      const key = row?.key, name = row?.item?.name ?? row?.name, code = row?.item?.code ?? row?.code;
      if (key && name) { _divKeyToInfo[key] = { name, code }; _divKeyToInfo[key.toLowerCase()] = { name, code }; }
    });
  } catch(e) {}
}

/* ══════════════════════════════════
   Normalize raw item from batch
══════════════════════════════════ */
function normalize(raw) {
  const it  = raw?.item ?? raw;
  const cf2 = it?.customFields2 ?? {};
  const key = raw?.key ?? null;

  const cfStrings      = cf2.strings      ?? {};
  const cfDecimals     = cf2.decimals     ?? {};
  const cfDates        = cf2.dates        ?? {};
  const cfBooleans     = cf2.booleans     ?? {};
  const cfStringArrays = cf2.stringArrays ?? {};
  const hasCF = !!(Object.keys(cfStrings).length||Object.keys(cfDecimals).length||Object.keys(cfDates).length||Object.keys(cfBooleans).length||Object.keys(cfStringArrays).length);

  // Self-link — this is how we'll fetch qty data
  // Manager returns: /api4/inventory-item?o=<key>  OR  /api4/inventory-item/<key>
  const selfHref = raw?._links?.self?.href ?? null;

  return {
    key,
    selfHref,
    itemCode: it?.itemCode ?? null,
    itemName: it?.itemName ?? it?.nameWithCode ?? it?.text ?? '(Unnamed)',
    unitName: it?.unitName ?? null,
    valuationMethod: it?.valuationMethod ?? null,
    inactive: it?.inactive ?? false,
    reorderPoint: it?.reorderPoint ?? false,
    qtyDesired: it?.qtyDesired ?? 0,

    // Qty — null until loaded via self-link
    qtyOwned:     null,
    qtyOnHand:    null,
    qtyToDeliver: null,
    qtyToReceive: null,
    averageCost:  it?.obsolete_StartingBalanceAverageCost2 > 0 ? it.obsolete_StartingBalanceAverageCost2 : null,
    totalValue:   null,
    qtyLoaded:    false,

    defPurchasePrice: it?.hasDefaultPurchaseUnitPrice ? (it?.defaultPurchaseUnitPrice ?? 0) : null,
    defSalePrice:     it?.hasDefaultSalesUnitPrice    ? (it?.defaultSalesUnitPrice    ?? 0) : null,
    defaultQty:       it?.hasDefaultQty ? (it?.defaultQty ?? 0) : null,
    defaultLineDesc:  it?.hasDefaultLineDescription ? it?.defaultLineDescription : null,

    division:        resolveDiv(it?.division),
    defaultDivision: it?.hasDefaultDivision ? resolveDiv(it?.defaultDivision) : null,
    divisionEnabled: it?.divisionEnabled ?? false,
    incomeAccountName:  it?.customIncomeAccount  ? resolveDiv(it?.incomeAccount)?.name  : null,
    expenseAccountName: it?.customExpenseAccount ? resolveDiv(it?.expenseAccount)?.name : null,
    controlAccountName: resolveDiv(it?.controlAccount)?.name ?? null,

    cfStrings, cfDecimals, cfDates, cfBooleans, cfStringArrays, hasCF,
  };
}

/* ══════════════════════════════════
   loadAllRecords — Phase 1: load items
══════════════════════════════════ */
async function loadAllRecords() {
  const btn = document.getElementById('load-btn');
  const bar = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true; btn.textContent = 'Loading…';
  bar.style.width = '0%';
  document.getElementById('app-init').innerHTML = '';
  document.getElementById('stats-grid').style.display = 'none';
  document.getElementById('tabs-container').style.display = 'none';
  document.getElementById('info-bar-wrap').innerHTML = '';
  document.getElementById('qty-panel-wrap').innerHTML = '';

  const ctrlIds = ['search-input','sort-select','f-active','f-reorder','f-hasdiv','f-negqty','qty-btn'];
  ctrlIds.forEach(id => { const el=document.getElementById(id); if(el) el.disabled=true; });

  try {
    status.textContent = 'Fetching items & field definitions…';
    const [rawItems] = await Promise.all([
      getInventoryItemBatch((loaded, total, page) => {
        status.textContent = total
          ? `Items: ${loaded.toLocaleString()} / ${total.toLocaleString()}`
          : `Items: ${loaded.toLocaleString()} loaded…`;
        if (total) bar.style.width = Math.min(90, Math.round(loaded/total*90)) + '%';
      }),
      fetchMetadata(),
    ]);
    bar.style.width = '100%';

    _raw = rawItems.map(r => normalize(r));

    // Check how many have self-links
    const withLinks = _raw.filter(i => i.selfHref).length;
    const withoutLinks = _raw.length - withLinks;

    status.textContent = `✓ ${_raw.length.toLocaleString()} items loaded · ${withLinks} have detail links`;
    btn.textContent = '↺ Reload'; btn.disabled = false;

    // Enable controls
    ctrlIds.forEach(id => { const el=document.getElementById(id); if(el) el.disabled=false; });
    document.getElementById('tabs-container').style.display = 'block';

    if (withLinks > 0) {
      showInfo(`✓ ${_raw.length} items loaded. ${withLinks} items have detail links. Click ⚖ Load Quantities to fetch qty data (may take ~${Math.ceil(withLinks/3)}s).`, 'teal');
    } else {
      showInfo(`⚠ ${_raw.length} items loaded but no self-links found in API response. Qty data unavailable.`, 'warn');
      document.getElementById('qty-btn').disabled = true;
    }

    _page = 1;
    applyFilters();

  } catch(err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry'; btn.disabled = false;
    document.getElementById('app-init').innerHTML =
      `<div class="err-box">⚠ ${esc(err.message)}<br><small>Make sure this is running inside Manager.io</small></div>`;
  }
}

/* ══════════════════════════════════
   loadQuantities — Phase 2
   Fetches each item's detail page via self-link,
   extracts all qty/value fields.
   Runs in batches of 5 concurrent requests.
   Updates UI incrementally.
══════════════════════════════════ */
async function loadQuantities() {
  const qtyBtn = document.getElementById('qty-btn');
  qtyBtn.disabled = true; qtyBtn.textContent = '⏳ Loading…';
  _cancelQtyLoad = false;
  _debugLog = [];

  const itemsWithLinks = _raw.filter(i => i.selfHref && !i.qtyLoaded);
  const total = itemsWithLinks.length;

  if (total === 0) {
    showInfo('All quantities already loaded or no items with detail links.', 'ok');
    qtyBtn.disabled = false; qtyBtn.textContent = '↺ Reload Quantities';
    return;
  }

  // Show progress panel
  document.getElementById('qty-panel-wrap').innerHTML = `
    <div class="qty-progress-panel" id="qty-panel">
      <div class="qpp-title">⚖ Loading Inventory Quantities</div>
      <div class="qpp-bar-wrap"><div class="qpp-bar" id="qpp-bar"></div></div>
      <div class="qpp-stats">
        <span>Loaded: <span class="qpp-stat-val" id="qpp-loaded">0</span> / ${total}</span>
        <span>Matched qty: <span class="qpp-stat-val" id="qpp-matched">0</span></span>
        <span>Errors: <span class="qpp-stat-val" id="qpp-errors">0</span></span>
        <span>Speed: <span class="qpp-stat-val" id="qpp-speed">—</span> items/s</span>
        <span>ETA: <span class="qpp-stat-val" id="qpp-eta">—</span></span>
      </div>
      <button class="qpp-cancel" onclick="_cancelQtyLoad=true;this.textContent='Cancelling…';this.disabled=true">✕ Cancel</button>
    </div>`;

  let loaded = 0, matched = 0, errors = 0;
  const startTime = Date.now();
  const BATCH_SIZE = 5; // concurrent requests

  // Process in batches
  for (let batchStart = 0; batchStart < itemsWithLinks.length; batchStart += BATCH_SIZE) {
    if (_cancelQtyLoad) break;

    const batch = itemsWithLinks.slice(batchStart, batchStart + BATCH_SIZE);

    // Fetch batch concurrently
    const results = await Promise.allSettled(
      batch.map(item => postMessageWithResponse({ type: 'api-request', method: 'GET', path: item.selfHref }))
    );

    results.forEach((result, idx) => {
      const item = batch[idx];
      loaded++;

      if (result.status === 'fulfilled') {
        const qty = extractQtyFromDetail(result.value, item.key);

        // Store debug info for first item only
        if (_debugLog.length === 0 && loaded <= 3) {
          _debugLog.push({
            item: item.itemName,
            href: item.selfHref,
            rawKeys: qty._rawKeys,
            numericFields: qty._allFields,
            links: qty._links,
            extracted: { qtyOwned: qty.qtyOwned, qtyOnHand: qty.qtyOnHand, qtyToDeliver: qty.qtyToDeliver, qtyToReceive: qty.qtyToReceive, averageCost: qty.averageCost, totalValue: qty.totalValue }
          });
        }

        // Apply to item
        const rawItem = _raw.find(r => r.key === item.key);
        if (rawItem) {
          rawItem.qtyOwned     = qty.qtyOwned;
          rawItem.qtyOnHand    = qty.qtyOnHand;
          rawItem.qtyToDeliver = qty.qtyToDeliver;
          rawItem.qtyToReceive = qty.qtyToReceive;
          if (qty.averageCost !== null)  rawItem.averageCost = qty.averageCost;
          if (qty.totalValue  !== null)  rawItem.totalValue  = qty.totalValue;
          rawItem.qtyLoaded = true;

          if (qty.qtyOwned !== null || qty.qtyOnHand !== null ||
              qty.qtyToDeliver !== null || qty.qtyToReceive !== null) {
            matched++;
          }
        }
      } else {
        errors++;
      }

      // Update progress UI
      const pct = Math.round(loaded / total * 100);
      const elapsed = (Date.now() - startTime) / 1000;
      const speed = (loaded / elapsed).toFixed(1);
      const remaining = total - loaded;
      const eta = speed > 0 ? Math.ceil(remaining / speed) : '—';

      const qppBar = document.getElementById('qpp-bar');
      if (qppBar) qppBar.style.width = pct + '%';
      const qppLoaded = document.getElementById('qpp-loaded');
      if (qppLoaded) qppLoaded.textContent = loaded;
      const qppMatched = document.getElementById('qpp-matched');
      if (qppMatched) qppMatched.textContent = matched;
      const qppErrors = document.getElementById('qpp-errors');
      if (qppErrors) qppErrors.textContent = errors;
      const qppSpeed = document.getElementById('qpp-speed');
      if (qppSpeed) qppSpeed.textContent = speed;
      const qppEta = document.getElementById('qpp-eta');
      if (qppEta) qppEta.textContent = typeof eta === 'number' ? `${eta}s` : eta;
    });

    // Refresh table every 10 items
    if (loaded % 10 === 0 || loaded === total) {
      applyFilters();
    }

    // Small yield to keep UI responsive
    await new Promise(r => setTimeout(r, 0));
  }

  // Done — update UI
  const panel = document.getElementById('qty-panel');
  if (panel) {
    const cancelBtn = panel.querySelector('.qpp-cancel');
    if (cancelBtn) cancelBtn.remove();
    panel.innerHTML += `<div style="margin-top:8px;font-size:11px;color:var(--green);font-weight:600">
      ✓ Complete — ${loaded} fetched · ${matched} had qty data · ${errors} errors
    </div>`;
  }

  // Show debug button if no qty matched (helps diagnose)
  if (matched === 0 && _debugLog.length > 0) {
    document.getElementById('dbg-btn').style.display = 'inline-block';
    document.getElementById('dbg-btn').disabled = false;
    showInfo(`⚠ Quantities fetched but 0 matched. The API response has different field names. Click 🔍 Debug to see actual field names returned.`, 'warn');
    renderDebug();
  } else {
    showInfo(`✓ Quantities loaded — ${matched}/${total} items have qty data.`, 'ok');
  }

  qtyBtn.disabled = false;
  qtyBtn.textContent = matched > 0 ? '✓ Quantities Loaded' : '↺ Retry Quantities';
  _qtyLoaded = matched;
  applyFilters();
}

/* ══════════════════════════════════
   Filters & sort
══════════════════════════════════ */
function toggleF(key) {
  _filters[key] = !_filters[key];
  document.getElementById('f-'+key)?.classList.toggle('on', _filters[key]);
  _page = 1; applyFilters();
}

function applyFilters() {
  const q  = (document.getElementById('search-input')?.value ?? '').trim().toLowerCase();
  const sk = document.getElementById('sort-select')?.value ?? 'name-asc';

  let list = _raw.filter(i => {
    if (_filters.active  && i.inactive) return false;
    if (_filters.reorder && !i.reorderPoint) return false;
    if (_filters.hasdiv  && !i.division) return false;
    if (_filters.negqty  && !((i.qtyOnHand??0)<0||(i.qtyOwned??0)<0)) return false;
    if (q && !(i.itemName.toLowerCase().includes(q)||(i.itemCode??'').toLowerCase().includes(q))) return false;
    return true;
  });

  list.sort((a,b) => {
    switch(sk) {
      case 'name-asc':       return a.itemName.localeCompare(b.itemName);
      case 'name-desc':      return b.itemName.localeCompare(a.itemName);
      case 'code-asc':       return (a.itemCode??'zzz').localeCompare(b.itemCode??'zzz');
      case 'qty-hand-desc':  return (b.qtyOnHand??-Infinity)-(a.qtyOnHand??-Infinity);
      case 'qty-owned-desc': return (b.qtyOwned??-Infinity)-(a.qtyOwned??-Infinity);
      case 'val-desc':       return (b.totalValue??-Infinity)-(a.totalValue??-Infinity);
      case 'sale-desc':      return (b.defSalePrice??-Infinity)-(a.defSalePrice??-Infinity);
      default:               return a.itemName.localeCompare(b.itemName);
    }
  });

  _filtered = list;
  renderStats();
  renderContent();
}

/* ══════════════════════════════════
   Stats
══════════════════════════════════ */
function renderStats() {
  const total    = _raw.length;
  const active   = _raw.filter(i=>!i.inactive).length;
  const reorder  = _raw.filter(i=>i.reorderPoint).length;
  const hasDivs  = _raw.filter(i=>i.division).length;
  const negQty   = _raw.filter(i=>(i.qtyOnHand??0)<0||(i.qtyOwned??0)<0).length;
  const totalVal = _raw.reduce((s,i)=>s+(i.totalValue??0),0);
  const totalOwn = _raw.reduce((s,i)=>s+(i.qtyOwned??0),0);
  const qtyLoaded= _raw.filter(i=>i.qtyLoaded).length;

  const sg = document.getElementById('stats-grid');
  sg.style.display = 'grid';
  sg.innerHTML = [
    ['Total Items',    total,             'all records',           'var(--head)'],
    ['Active',         active,            `${total?Math.round(active/total*100):0}% of total`, 'var(--green)'],
    ['Qty Loaded',     qtyLoaded,         `of ${total} items`,     qtyLoaded===total?'var(--green)':'var(--teal)'],
    ['Total Qty Owned',num(totalOwn,0),   'sum all items',         'var(--teal)'],
    ['Total Value',    num(totalVal,0),   'inventory value sum',   'var(--accent)'],
    ['Reorder Set',    reorder,           'have reorder point',    'var(--amber)'],
    ['Showing',        _filtered.length,  'after filters',         'var(--muted)'],
  ].map(([l,v,s,c])=>`
    <div class="stat-card">
      <div class="stat-label">${l}</div>
      <div class="stat-value" style="color:${c}">${typeof v==='number'?v.toLocaleString():v}</div>
      <div class="stat-sub">${s}</div>
    </div>`).join('');
}

/* ══════════════════════════════════
   Tabs
══════════════════════════════════ */
function switchTab(tab) {
  _tab = tab; _page = 1;

/* ══════════════════════════════════
   Pagination
══════════════════════════════════ */
function pageSlice() {
  const total = _filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if (_page > totalPages) _page = totalPages;
  const start = (_page-1)*PAGE_SIZE;
  return { items: _filtered.slice(start, start+PAGE_SIZE), start, total, totalPages };
}
function pgHTML(total, totalPages, start) {
  if (totalPages<=1 && total<=PAGE_SIZE) return '';
  const p=_page, mb=7;
  let ps=Math.max(1,p-3), pe=Math.min(totalPages,ps+mb-1);
  if(pe-ps<mb-1) ps=Math.max(1,pe-mb+1);
  let b='';
  if(ps>1) b+=`<button class="pg-btn" onclick="goPage(1)">1</button>${ps>2?'<span class="pg-dots">…</span>':''}`;
  for(let i=ps;i<=pe;i++) b+=`<button class="pg-btn${i===p?' cur':''}" onclick="goPage(${i})">${i}</button>`;
  if(pe<totalPages) b+=`${pe<totalPages-1?'<span class="pg-dots">…</span>':''}<button class="pg-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  return `<div class="pagination">
    <span>Rows ${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total.toLocaleString()}</span>
    <button class="pg-btn" onclick="goPage(${p-1})" ${p<=1?'disabled':''}>← Prev</button>
    ${b}
    <button class="pg-btn" onclick="goPage(${p+1})" ${p>=totalPages?'disabled':''}>Next →</button>
  </div>`;
}
function goPage(p) {
  const tp = Math.max(1, Math.ceil(_filtered.length/PAGE_SIZE));
  _page = Math.max(1, Math.min(p, tp));
  renderContent();
  document.getElementById('app')?.scrollIntoView({behavior:'smooth'});
}
function wrapTable(tbl, pag) {
  if (!_filtered.length) return `<div class="tbl-wrap"><div class="empty-state">
    <div class="icon">📭</div><div>${_raw.length?'No items match filters.':'No data loaded.'}</div>
  </div></div>`;
  return `<div class="tbl-wrap"><div class="tbl-scroll">${tbl}</div>${pag}</div>`;
}
let _lastGrp = '';
function maybeGrp(name, cols) {
  const sk = document.getElementById('sort-select')?.value ?? 'name-asc';
  if (sk !== 'name-asc') return '';
  const ch = (name||'?')[0].toUpperCase();
  const g  = /[A-Z]/.test(ch) ? ch : '#';
  if (g === _lastGrp) return '';
  _lastGrp = g;
  return `<tr class="grp-row"><td colspan="${cols}">— ${g} —</td></tr>`;
}
function divCell(d) {
  if (!d) return `<span class="td-dim">—</span>`;
  const code = d.code ? `<span class="div-code">(${esc(d.code)})</span>` : '';
  return `<span class="div-chip">${esc(d.name)}</span>${code}`;
}
function getCFCols(items, field) {
  const seen = new Map();
  items.forEach(i => Object.keys(i[field]??{}).forEach(k => { if(!seen.has(k)) seen.set(k, cfLabel(k)); }));
  return [...seen.entries()].map(([key,label]) => ({key,label}));
}

/* ══════════════════════════════════
   Tab: Custom Fields
══════════════════════════════════ */
function renderCFTab() {
  const {items,start,total,totalPages} = pageSlice();
  const strCols  = getCFCols(_filtered,'cfStrings');
  const decCols  = getCFCols(_filtered,'cfDecimals');
  const boolCols = getCFCols(_filtered,'cfBooleans');
  const dateCols = getCFCols(_filtered,'cfDates');
  const arrCols  = getCFCols(_filtered,'cfStringArrays');
  const cfCount  = strCols.length+decCols.length+boolCols.length+dateCols.length+arrCols.length;

  if (cfCount === 0) {
    document.getElementById('app').innerHTML = `<div class="tbl-wrap"><div class="empty-state"><div class="icon">🏷</div><div>No custom field data found.</div></div></div>`;
    return;
  }
  _lastGrp = '';
  const totalCols = 2 + cfCount;
  let rows = '';
  items.forEach(i => {
    rows += maybeGrp(i.itemName, totalCols);
    let cells = `
      <td class="td-code">${i.itemCode?esc(i.itemCode):'<span class="td-dim">—</span>'}</td>
      <td class="td-name" title="${esc(i.itemName)}">${esc(i.itemName)}</td>`;
    strCols.forEach(({key})  => { const v=i.cfStrings[key];       cells+=`<td class="cf-cell">${v!=null?esc(String(v)):'<span class="td-dim">—</span>'}</td>`; });
    decCols.forEach(({key})  => { const v=i.cfDecimals[key];      cells+=`<td class="td-num">${v!=null?num(Number(v),2):'<span class="td-dim">—</span>'}</td>`; });
    boolCols.forEach(({key}) => { const v=i.cfBooleans[key];      cells+=`<td style="text-align:center">${v!=null?(v?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--muted)">✗</span>'):'<span class="td-dim">—</span>'}</td>`; });
    dateCols.forEach(({key}) => { const v=i.cfDates[key];         cells+=`<td class="cf-cell">${v?esc(String(v)):'<span class="td-dim">—</span>'}</td>`; });
    arrCols.forEach(({key})  => { const v=i.cfStringArrays[key];  const d=Array.isArray(v)?v.join(', '):(v!=null?String(v):null); cells+=`<td class="cf-cell">${d?esc(d):'<span class="td-dim">—</span>'}</td>`; });
    rows += `<tr>${cells}</tr>`;
  });
  const cgRow = [`<th class="cg cg-id" colspan="2">Identification</th>`,
    strCols.length?`<th class="cg cg-cf" colspan="${strCols.length}">Text</th>`:'',
    decCols.length?`<th class="cg cg-cf" colspan="${decCols.length}">Number</th>`:'',
    boolCols.length?`<th class="cg cg-cf" colspan="${boolCols.length}">Yes/No</th>`:'',
    dateCols.length?`<th class="cg cg-cf" colspan="${dateCols.length}">Date</th>`:'',
    arrCols.length?`<th class="cg cg-cf" colspan="${arrCols.length}">List</th>`:'',
  ].join('');
  const hdrRow = [`<th>Code</th><th>Item Name</th>`,
    ...strCols.map(c=>`<th>${esc(c.label)}</th>`),
    ...decCols.map(c=>`<th class="r">${esc(c.label)}</th>`),
    ...boolCols.map(c=>`<th style="text-align:center">${esc(c.label)}</th>`),
    ...dateCols.map(c=>`<th>${esc(c.label)}</th>`),
    ...arrCols.map(c=>`<th>${esc(c.label)}</th>`),
  ].join('');
  const tbl = `<table>
    <thead><tr class="cg-row">${cgRow}</tr><tr class="hdr-row">${hdrRow}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
  document.getElementById('app').innerHTML = wrapTable(tbl, pgHTML(total,totalPages,start));
}
