<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventory Items — Full View</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f7fa;
  --surface:   #ffffff;
  --panel:     #ffffff;
  --border:    #dde2ea;
  --border2:   #c8d0dc;
  --accent:    #1d6fce;
  --accent-lt: #e8f1fb;
  --green:     #1a7f37;
  --green-lt:  #e6f4ea;
  --red:       #cf222e;
  --red-lt:    #ffeef0;
  --amber:     #9a6700;
  --amber-lt:  #fff8c5;
  --purple:    #6639ba;
  --purple-lt: #ede8ff;
  --teal:      #0e7490;
  --teal-lt:   #e0f2f7;
  --muted:     #8391a4;
  --text:      #1c2635;
  --text-dim:  #57657a;
  --head:      #0d1b2a;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Plus Jakarta Sans', system-ui, sans-serif;
  --radius:    8px;
  --shadow:    0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);
}

html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
  font-size: 13px;
}

/* ── Topbar ── */
.topbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 16px; margin-bottom: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  position: sticky; top: 0; z-index: 200;
}
.brand { font-size: 13px; font-weight: 800; color: var(--accent); letter-spacing: .04em; white-space: nowrap; }
.vsep  { width: 1px; height: 22px; background: var(--border2); flex-shrink: 0; }

.load-btn {
  padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-family: var(--sans); font-size: 12px; font-weight: 700;
  background: var(--accent); color: #fff;
  transition: opacity .15s, transform .1s; white-space: nowrap;
}
.load-btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
.load-btn:disabled { opacity: .45; cursor: not-allowed; }

.print-btn {
  padding: 7px 14px; border: 1px solid var(--border2); border-radius: 6px;
  background: transparent; color: var(--text-dim); font-family: var(--sans);
  font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s;
}
.print-btn:hover { background: var(--bg); color: var(--text); }

.search-wrap { position: relative; min-width: 140px; max-width: 260px; flex: 1; }
.search-wrap input {
  width: 100%; padding: 6px 10px 6px 28px;
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text);
  font-family: var(--mono); font-size: 11px; outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.si { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--muted); pointer-events: none; }

.ctrl-sel {
  padding: 6px 9px; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: var(--sans);
  font-size: 11px; outline: none; cursor: pointer;
}
.fbtn {
  padding: 5px 11px; border: 1px solid var(--border2); border-radius: 6px;
  background: transparent; color: var(--text-dim); font-family: var(--sans);
  font-size: 11px; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.fbtn.on { background: var(--accent-lt); color: var(--accent); border-color: var(--accent); font-weight: 700; }

.prog-wrap { flex: 1; min-width: 60px; max-width: 140px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-bar  { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width .25s; }
.status-txt { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }

/* ── Stats ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px; margin-bottom: 14px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; box-shadow: var(--shadow);
}
.stat-label { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 4px; }
.stat-value { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--head); line-height: 1; }
.stat-sub   { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

/* ── Tabs ── */
.tab-bar { display: flex; gap: 2px; margin-bottom: 0; border-bottom: 2px solid var(--border); }
.tab {
  padding: 8px 16px; font-size: 11px; font-weight: 700; cursor: pointer;
  color: var(--text-dim); border-radius: 6px 6px 0 0;
  transition: all .15s; white-space: nowrap; border: 1px solid transparent;
  border-bottom: none; margin-bottom: -2px;
}
.tab:hover { color: var(--accent); }
.tab.active {
  background: var(--surface); color: var(--accent);
  border-color: var(--border); border-bottom-color: var(--surface);
}

/* ── Table ── */
.tbl-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px;
}
.tbl-scroll { overflow-x: auto; max-height: calc(100vh - 300px); overflow-y: auto; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead { position: sticky; top: 0; z-index: 10; }

/* col-group row */
thead tr.cg-row { background: #f0f4f9; }
th.cg {
  padding: 4px 10px 3px; font-size: 8px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .14em; text-align: center;
  border-bottom: 1px solid var(--border); border-right: 1px solid var(--border2);
}
th.cg:last-child { border-right: none; }
.cg-id   { color: #5a6a7a; background: #edf1f6; }
.cg-qty  { color: #0e7490; background: #e0f6fb; }
.cg-val  { color: #1a7f37; background: #e6f4ea; }
.cg-div  { color: #6639ba; background: #ede8ff; }
.cg-cf   { color: #9a6700; background: #fff8c5; }
.cg-misc { color: #5a6a7a; background: #edf1f6; }

thead tr.hdr-row { background: #f6f8fb; }
th {
  padding: 8px 10px; text-align: left;
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em;
  border-bottom: 2px solid var(--border2);
  border-right: 1px solid var(--border);
  white-space: nowrap; cursor: pointer; user-select: none;
  transition: color .15s;
}
th:last-child { border-right: none; }
th:hover { color: var(--accent); }
th.r { text-align: right; }

tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f5f8ff; }

td {
  padding: 8px 10px; vertical-align: middle;
  border-right: 1px solid #edf1f6;
}
td:last-child { border-right: none; }

.td-name { font-weight: 600; color: var(--head); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.td-code { font-family: var(--mono); font-size: 10px; color: var(--accent); white-space: nowrap; }
.td-unit { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.td-num  { font-family: var(--mono); font-size: 11px; text-align: right; }
.td-dim  { color: #b0bac6; }
.td-na   { color: #c8d4e0; font-style: italic; }

.badge {
  display: inline-block; padding: 2px 7px; border-radius: 20px;
  font-size: 9px; font-weight: 700; letter-spacing: .05em; white-space: nowrap;
}
.b-active   { background: var(--green-lt);  color: var(--green);  border: 1px solid #b0e4be; }
.b-inactive { background: var(--red-lt);    color: var(--red);    border: 1px solid #ffc0c0; }
.b-val      { background: var(--accent-lt); color: var(--accent); border: 1px solid #b8d4f5; }
.b-div      { background: var(--purple-lt); color: var(--purple); border: 1px solid #c8b8f0; }
.b-reorder  { background: var(--amber-lt);  color: var(--amber);  border: 1px solid #e8d060; }

/* group letter divider */
.grp-row td {
  background: #eef2f8; font-size: 9px; font-weight: 800;
  color: var(--accent); text-transform: uppercase; letter-spacing: .16em;
  padding: 4px 10px; border-top: 1px solid var(--border2);
}

/* division chip */
.div-chip {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 10px; background: var(--purple-lt); color: var(--purple);
  border: 1px solid #c8b8f0;
}

/* custom field tag */
.cf-tag {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 10px; background: var(--amber-lt); color: var(--amber);
  border: 1px solid #e8d060; font-family: var(--mono);
  max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* empty / error */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 13px;
}
.empty-state .icon { font-size: 40px; margin-bottom: 10px; }
.err-box {
  color: var(--red); background: var(--red-lt);
  border: 1px solid #ffc0c0; border-radius: var(--radius);
  padding: 12px 16px; font-size: 12px; margin-bottom: 14px;
}

/* pagination */
.pagination {
  display: flex; align-items: center; justify-content: flex-end; gap: 6px;
  padding: 10px 14px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); flex-wrap: wrap;
  background: #fafbfd;
}
.pg-btn {
  padding: 4px 10px; border: 1px solid var(--border2);
  border-radius: 5px; background: var(--surface); color: var(--text-dim);
  font-family: var(--sans); font-size: 11px; cursor: pointer; transition: all .15s;
}
.pg-btn:hover:not(:disabled) { background: var(--accent-lt); color: var(--accent); border-color: var(--accent); }
.pg-btn:disabled { opacity: .35; cursor: not-allowed; }
.pg-btn.cur { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
.pg-dots { color: var(--muted); }

/* print */
@media print {
  body { padding: 0; background: white; font-size: 10px; }
  .topbar, .tab-bar, .pagination, .stats-grid, .fbtn, .search-wrap, .ctrl-sel, .print-btn { display: none !important; }
  .tbl-wrap { box-shadow: none; border-radius: 0; }
  .tbl-scroll { max-height: none; overflow: visible; }
  table { font-size: 9px; }
  th, td { padding: 5px 7px; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- ── Control bar ── -->
<div class="topbar">
  <span class="brand">📦 Inventory Items</span>
  <div class="vsep"></div>
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <button class="print-btn" onclick="window.print()">🖨 Print / Export</button>

  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search-input" placeholder="Search name / code…" oninput="applyFilters()" disabled>
  </div>

  <select class="ctrl-sel" id="sort-select" onchange="applyFilters()" disabled>
    <option value="name-asc">Name A→Z</option>
    <option value="name-desc">Name Z→A</option>
    <option value="code-asc">Code A→Z</option>
    <option value="sale-desc">Sale Price ↓</option>
    <option value="purchase-desc">Purchase Price ↓</option>
    <option value="qty-desc">Qty Desired ↓</option>
  </select>

  <button class="fbtn" id="f-active"  onclick="toggleF('active')"  disabled>Active Only</button>
  <button class="fbtn" id="f-reorder" onclick="toggleF('reorder')" disabled>Reorder</button>
  <button class="fbtn" id="f-hasdiv"  onclick="toggleF('hasdiv')"  disabled>Has Division</button>
  <button class="fbtn" id="f-hascf"   onclick="toggleF('hascf')"   disabled>Has Custom Fields</button>

  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data</span>
</div>

<!-- Stats injected here -->
<div class="stats-grid" id="stats-grid" style="display:none"></div>

<!-- Tab bar + content -->
<div id="tabs-container" style="display:none">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('inventory')">📊 Inventory &amp; Quantities</div>
    <div class="tab" onclick="switchTab('pricing')">💰 Pricing &amp; Valuation</div>
    <div class="tab" onclick="switchTab('divisions')">🏢 Divisions &amp; Accounts</div>
    <div class="tab" onclick="switchTab('customfields')">🏷 Custom Fields</div>
    <div class="tab" onclick="switchTab('all')">⚙ All Fields</div>
  </div>
  <div id="app"></div>
</div>

<div id="app-init"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getInventoryItemBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
   Manager.io returns ≤50 records per call.
   This loop follows next_page_token until
   every record is loaded.
══════════════════════════════════ */
async function getInventoryItemBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/inventory-item-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/inventory-item-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   State
══════════════════════════════════ */
let _raw      = [];
let _filtered = [];
let _page     = 1;
let _tab      = 'inventory';
const PAGE_SIZE = 50;
const _filters = { active: false, reorder: false, hasdiv: false, hascf: false };

/* valuation method labels */
const VALUATION = { 1: 'Average Cost', 2: 'FIFO', 3: 'LIFO', 4: 'Specific ID' };

/* ══════════════════════════════════
   Utility: resolve a Manager "reference" object or string
   Manager often returns { key, name } objects for linked entities.
   We always display .name if available, fallback to .text, then raw string.
══════════════════════════════════ */
function resolveName(val) {
  if (val == null) return null;
  if (typeof val === 'object') {
    // Manager reference objects typically have .name or .text
    return val.name ?? val.text ?? val.nameWithCode ?? val.uniqueName ?? JSON.stringify(val);
  }
  return String(val);
}

/* ══════════════════════════════════
   Utility: resolve custom field display name
   customFields2.strings keys are often GUIDs — fetch the human label
   from the key's "name" sub-property if available, else prettify the key.
   Manager may structure CF keys as { key, name } pairs inside the batch.
   We probe multiple known patterns.
══════════════════════════════════ */
function cfKeyLabel(key, cfMeta) {
  // cfMeta may hold a name lookup if Manager provides it
  if (cfMeta && cfMeta[key] && typeof cfMeta[key] === 'object' && cfMeta[key].name) {
    return cfMeta[key].name;
  }
  // If the key looks like a UUID, return it as-is (will be replaced by metadata if found)
  // Otherwise prettify camelCase / underscore
  if (/^[0-9a-f-]{32,}$/i.test(key)) return key;
  return key.replace(/([A-Z])/g, ' $1').replace(/_/g, ' ').trim();
}

/* ══════════════════════════════════
   Normalize raw API record → flat object
══════════════════════════════════ */
function normalize(raw) {
  const it  = raw?.item ?? raw;
  const cf2 = it?.customFields2 ?? {};

  // Collect all custom field values keyed by field identifier
  // Manager may provide { key: uuid, name: 'Field Label', value: ... } patterns
  // We capture both the raw map and try to extract human names.
  const cfStrings     = cf2.strings      ?? {};
  const cfDecimals    = cf2.decimals     ?? {};
  const cfDates       = cf2.dates        ?? {};
  const cfBooleans    = cf2.booleans     ?? {};
  const cfStringArrays= cf2.stringArrays ?? {};

  // Build human-name lookup from any embedded metadata arrays
  // Some endpoints return arrays of { key, name, value } inside customFields
  const cfNameMap = {};
  if (Array.isArray(it?.customFields)) {
    it.customFields.forEach(f => {
      if (f?.key && f?.name) cfNameMap[f.key] = f.name;
    });
  }

  const hasCF = !!(
    Object.keys(cfStrings).length ||
    Object.keys(cfDecimals).length ||
    Object.keys(cfDates).length ||
    Object.keys(cfBooleans).length ||
    Object.keys(cfStringArrays).length
  );

  return {
    key:             raw?.key ?? null,
    itemCode:        it?.itemCode   ?? null,
    itemName:        it?.itemName   ?? it?.nameWithCode ?? it?.text ?? '(Unnamed)',
    unitName:        it?.unitName   ?? null,
    valuationMethod: it?.valuationMethod ?? null,
    inactive:        it?.inactive   ?? false,
    reorderPoint:    it?.reorderPoint ?? false,
    qtyDesired:      it?.qtyDesired ?? 0,

    // Inventory quantity fields (populated by inventory-item-batch when available)
    qtyOwned:        it?.qtyOwned        ?? it?.quantityOwned      ?? null,
    qtyOnHand:       it?.qtyOnHand       ?? it?.quantityOnHand     ?? null,
    qtyToDeliver:    it?.qtyToDeliver    ?? it?.quantityToDeliver  ?? null,
    qtyToReceive:    it?.qtyToReceive    ?? it?.quantityToReceive  ?? null,
    averageCost:     it?.averageCost     ?? it?.unitCost           ??
                     (it?.obsolete_StartingBalanceAverageCost2 > 0
                       ? it.obsolete_StartingBalanceAverageCost2 : null),
    totalValue:      it?.totalValue      ?? it?.inventoryValue     ?? null,

    // Pricing defaults
    defPurchasePrice: it?.hasDefaultPurchaseUnitPrice ? (it?.defaultPurchaseUnitPrice ?? 0) : null,
    defSalePrice:     it?.hasDefaultSalesUnitPrice    ? (it?.defaultSalesUnitPrice    ?? 0) : null,
    defaultQty:       it?.hasDefaultQty ? (it?.defaultQty ?? 0) : null,
    defaultLineDesc:  it?.hasDefaultLineDescription ? it?.defaultLineDescription : null,

    // Division — always resolve to human name
    divisionName:      resolveName(it?.division),
    defaultDivisionName: it?.hasDefaultDivision ? resolveName(it?.defaultDivision) : null,
    divisionEnabled:   it?.divisionEnabled ?? false,

    // Accounts — resolve names
    incomeAccountName:  it?.customIncomeAccount  ? resolveName(it?.incomeAccount)  : null,
    expenseAccountName: it?.customExpenseAccount ? resolveName(it?.expenseAccount) : null,
    controlAccountName: resolveName(it?.controlAccount),

    // Custom fields raw maps (key → value)
    cfStrings,
    cfDecimals,
    cfDates,
    cfBooleans,
    cfStringArrays,
    cfNameMap,   // human-name lookup for CF keys
    hasCF,

    // Flags
    hasCOGS:        it?.hasCostOfGoodsSold ?? false,
    taxEnabled:     it?.taxCodeEnabled     ?? false,
    projectEnabled: it?.projectEnabled     ?? false,
  };
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true; btn.textContent = 'Loading…';
  bar.style.width = '0%';
  document.getElementById('app-init').innerHTML = '';
  document.getElementById('stats-grid').style.display = 'none';
  document.getElementById('tabs-container').style.display = 'none';

  const ids = ['search-input','sort-select','f-active','f-reorder','f-hasdiv','f-hascf'];
  ids.forEach(id => { const el = document.getElementById(id); if (el) el.disabled = true; });

  try {
    const raw = await getInventoryItemBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()}`
        : `Page ${page} · ${loaded.toLocaleString()} records…`;
      if (total) bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
    });

    bar.style.width = '100%';
    status.textContent = `✓ ${raw.length.toLocaleString()} records loaded`;
    btn.textContent = '↺ Reload'; btn.disabled = false;

    ids.forEach(id => { const el = document.getElementById(id); if (el) el.disabled = false; });
    document.getElementById('tabs-container').style.display = 'block';

    _raw = raw.map(normalize);
    _page = 1;
    applyFilters();

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry'; btn.disabled = false;
    document.getElementById('app-init').innerHTML =
      `<div class="err-box">⚠ ${esc(err.message)}<br><small>Make sure this is running inside Manager.io</small></div>`;
  }
}

/* ══════════════════════════════════
   Helpers
══════════════════════════════════ */
const esc   = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const num   = (v, d=0) => v != null ? Number(v).toLocaleString(undefined, { minimumFractionDigits:d, maximumFractionDigits:d }) : null;
const price = v => v != null ? num(v, 2) : null;
const dash  = () => `<span class="td-dim">—</span>`;
const na    = () => `<span class="td-na" title="Not provided by this endpoint">n/a</span>`;

/* Collect all CF key→humanName pairs across the full dataset */
function buildCFMeta(items, cfType) {
  // Returns array of { key, label } deduplicated
  const seen = new Map();
  items.forEach(i => {
    const map = i[cfType] ?? {};
    const nameMap = i.cfNameMap ?? {};
    Object.keys(map).forEach(k => {
      if (!seen.has(k)) {
        // Prefer embedded human name, else prettify
        const label = nameMap[k] ?? cfKeyLabel(k, null);
        seen.set(k, label);
      }
    });
  });
  return [...seen.entries()].map(([key, label]) => ({ key, label }));
}

/* ══════════════════════════════════
   Filters & sort
══════════════════════════════════ */
function toggleF(key) {
  _filters[key] = !_filters[key];
  const el = document.getElementById('f-' + key);
  if (el) el.classList.toggle('on', _filters[key]);
  _page = 1; applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('search-input')?.value ?? '').trim().toLowerCase();
  const sortKey = document.getElementById('sort-select')?.value ?? 'name-asc';

  let list = _raw.filter(i => {
    if (_filters.active  && i.inactive) return false;
    if (_filters.reorder && !i.reorderPoint) return false;
    if (_filters.hasdiv  && !i.divisionName && !i.defaultDivisionName) return false;
    if (_filters.hascf   && !i.hasCF) return false;
    if (q && !(i.itemName.toLowerCase().includes(q) || (i.itemCode??'').toLowerCase().includes(q))) return false;
    return true;
  });

  list.sort((a, b) => {
    switch (sortKey) {
      case 'name-asc':      return a.itemName.localeCompare(b.itemName);
      case 'name-desc':     return b.itemName.localeCompare(a.itemName);
      case 'code-asc':      return (a.itemCode??'zzz').localeCompare(b.itemCode??'zzz');
      case 'sale-desc':     return (b.defSalePrice??-Infinity)-(a.defSalePrice??-Infinity);
      case 'purchase-desc': return (b.defPurchasePrice??-Infinity)-(a.defPurchasePrice??-Infinity);
      case 'qty-desc':      return (b.qtyDesired??0)-(a.qtyDesired??0);
      default:              return a.itemName.localeCompare(b.itemName);
    }
  });

  _filtered = list;
  renderStats();
  renderContent();
}

/* ══════════════════════════════════
   Stats
══════════════════════════════════ */
function renderStats() {
  const total   = _raw.length;
  const active  = _raw.filter(i => !i.inactive).length;
  const reorder = _raw.filter(i => i.reorderPoint).length;
  const hasDivs = _raw.filter(i => i.divisionName).length;
  const hasCFs  = _raw.filter(i => i.hasCF).length;
  const sg = document.getElementById('stats-grid');
  sg.style.display = 'grid';
  sg.innerHTML = [
    ['Total Items',    total,           'all records',           'var(--head)'],
    ['Active',         active,          `${total?Math.round(active/total*100):0}% of total`, 'var(--green)'],
    ['Inactive',       total-active,    'hidden from use',       'var(--red)'],
    ['Reorder Set',    reorder,         'have reorder point',    'var(--amber)'],
    ['With Division',  hasDivs,         'have division',         'var(--purple)'],
    ['Custom Fields',  hasCFs,          'have CF data',          'var(--teal)'],
    ['Filtered Rows',  _filtered.length,'currently shown',       'var(--accent)'],
  ].map(([lbl,val,sub,col])=>`
    <div class="stat-card">
      <div class="stat-label">${lbl}</div>
      <div class="stat-value" style="color:${col}">${Number(val).toLocaleString()}</div>
      <div class="stat-sub">${sub}</div>
    </div>`).join('');
}

/* ══════════════════════════════════
   Tab switch
══════════════════════════════════ */
function switchTab(tab) {
  _tab = tab; _page = 1;
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['inventory','pricing','divisions','customfields','all'][i] === tab);
  });
  renderContent();
}

function renderContent() {
  switch (_tab) {
    case 'inventory':    renderInventoryTab();    break;
    case 'pricing':      renderPricingTab();      break;
    case 'divisions':    renderDivisionsTab();    break;
    case 'customfields': renderCFTab();           break;
    case 'all':          renderAllTab();          break;
  }
}

/* ══════════════════════════════════
   Pagination
══════════════════════════════════ */
function pageSlice() {
  const total = _filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (_page > totalPages) _page = totalPages;
  const start = (_page - 1) * PAGE_SIZE;
  return { items: _filtered.slice(start, start + PAGE_SIZE), start, total, totalPages };
}

function pgHTML(total, totalPages, start) {
  if (totalPages <= 1 && total <= PAGE_SIZE) return '';
  const p = _page, mb = 7;
  let ps = Math.max(1, p-3), pe = Math.min(totalPages, ps+mb-1);
  if (pe-ps < mb-1) ps = Math.max(1, pe-mb+1);
  let btns = '';
  if (ps>1) btns += `<button class="pg-btn" onclick="goPage(1)">1</button>${ps>2?'<span class="pg-dots">…</span>':''}`;
  for (let i=ps; i<=pe; i++) btns += `<button class="pg-btn${i===p?' cur':''}" onclick="goPage(${i})">${i}</button>`;
  if (pe<totalPages) btns += `${pe<totalPages-1?'<span class="pg-dots">…</span>':''}<button class="pg-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  return `<div class="pagination">
    <span>Rows ${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total.toLocaleString()}</span>
    <button class="pg-btn" onclick="goPage(${p-1})" ${p<=1?'disabled':''}>← Prev</button>
    ${btns}
    <button class="pg-btn" onclick="goPage(${p+1})" ${p>=totalPages?'disabled':''}>Next →</button>
  </div>`;
}

function goPage(p) {
  const tp = Math.max(1, Math.ceil(_filtered.length / PAGE_SIZE));
  _page = Math.max(1, Math.min(p, tp));
  renderContent();
  document.getElementById('app')?.scrollIntoView({ behavior: 'smooth' });
}

function wrapTable(tbl, pag) {
  if (!_filtered.length) return `<div class="tbl-wrap">
    <div class="empty-state"><div class="icon">📭</div>
    <div>${_raw.length ? 'No items match your filters.' : 'No data loaded.'}</div></div></div>`;
  return `<div class="tbl-wrap"><div class="tbl-scroll">${tbl}</div>${pag}</div>`;
}

/* optional group row (alpha letter) */
let _lastGrp = '';
function maybeGroupRow(name, cols) {
  const sortKey = document.getElementById('sort-select')?.value ?? 'name-asc';
  if (sortKey !== 'name-asc') return '';
  const ch = (name||'?')[0].toUpperCase();
  const g = /[A-Z]/.test(ch) ? ch : '#';
  if (g === _lastGrp) return '';
  _lastGrp = g;
  return `<tr class="grp-row"><td colspan="${cols}">— ${g} —</td></tr>`;
}

══════════════════════════════════ */

  const { items, start, total, totalPages } = pageSlice();

    const statusBadge = i.inactive

    const reorderCell = i.reorderPoint

      : dash();
    rows += `<tr>

      <td class="td-name" title="${esc(i.itemName)}">${esc(i.itemName)}</td>
      <td class="td-unit">${i.unitName ? esc(i.unitName) : dash()}</td>
      <td class="td-num">${qc(i.qtyOwned)}</td>
      <td class="td-num">${qc(i.qtyOnHand)}</td>
      <td class="td-num">${qc(i.qtyToDeliver)}</td>
      <td class="td-num">${qc(i.qtyToReceive)}</td>
      <td class="td-num">${i.averageCost!=null?`<b>${num(i.averageCost,4)}</b>`:na()}</td>
      <td class="td-num">${i.totalValue!=null?`<b style="color:var(--green)">${num(i.totalValue,2)}</b>`:na()}</td>
      <td>${reorderCell}</td>
      <td>${statusBadge}</td>
    </tr>`;
  });

  const tbl = `<table>
    <thead>
      <tr class="cg-row">
        <th class="cg cg-id" colspan="3">Identification</th>
        <th class="cg cg-qty" colspan="4">Quantities</th>
        <th class="cg cg-val" colspan="2">Valuation</th>
        <th class="cg cg-misc" colspan="2">Status</th>
      </tr>
      <tr class="hdr-row">
        <th>Code</th><th>Item Name</th><th>Unit</th>
        <th class="r">Qty Owned</th><th class="r">Qty On Hand</th>
        <th class="r">Qty to Deliver</th><th class="r">Qty to Receive</th>
        <th class="r">Avg Cost</th><th class="r">Total Value</th>
        <th class="r">Reorder</th><th>Status</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
  document.getElementById('app').innerHTML = wrapTable(tbl, pgHTML(total, totalPages, start));
}

/* ══════════════════════════════════
   Tab: Custom Fields
   Column headers = human-readable field names (not keys).
   Values shown as-is.
══════════════════════════════════ */
function renderCFTab() {
  const { items, start, total, totalPages } = pageSlice();

  // Build dynamic columns across all filtered items
  const strCols  = buildCFMeta(_filtered, 'cfStrings');
  const decCols  = buildCFMeta(_filtered, 'cfDecimals');
  const boolCols = buildCFMeta(_filtered, 'cfBooleans');
  const dateCols = buildCFMeta(_filtered, 'cfDates');
  const arrCols  = buildCFMeta(_filtered, 'cfStringArrays');
  const total_cols = 2 + strCols.length + decCols.length + boolCols.length + dateCols.length + arrCols.length;

  if (total_cols === 2) {
    document.getElementById('app').innerHTML = `<div class="tbl-wrap">
      <div class="empty-state"><div class="icon">🏷</div>
      <div>No custom field data found in loaded records.</div>
      <div style="font-size:11px;margin-top:6px;color:var(--muted)">Custom fields appear here when items have customFields2 data from Manager.</div>
      </div></div>`;
    return;
  }

  _lastGrp = '';
  let rows = '';
  items.forEach(i => {
    rows += maybeGroupRow(i.itemName, total_cols);
    let cells = `
      <td class="td-code">${i.itemCode ? esc(i.itemCode) : dash()}</td>
      <td class="td-name" title="${esc(i.itemName)}">${esc(i.itemName)}</td>`;

    strCols.forEach(({key}) => {
      const v = i.cfStrings[key];
      cells += `<td>${v!=null?`<span class="cf-tag" title="${esc(String(v))}">${esc(String(v))}</span>`:dash()}</td>`;
    });
    decCols.forEach(({key}) => {
      const v = i.cfDecimals[key];
      cells += `<td class="td-num">${v!=null?num(Number(v),2):dash()}</td>`;
    });
    boolCols.forEach(({key}) => {
      const v = i.cfBooleans[key];
      cells += `<td style="text-align:center">${v!=null?(v?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--muted)">✗</span>'):dash()}</td>`;
    });
    dateCols.forEach(({key}) => {
      const v = i.cfDates[key];
      cells += `<td style="font-family:var(--mono);font-size:10px">${v?esc(String(v)):dash()}</td>`;
    });
    arrCols.forEach(({key}) => {
      const v = i.cfStringArrays[key];
      const disp = Array.isArray(v) ? v.join(', ') : (v!=null ? String(v) : null);
      cells += `<td style="font-size:10px">${disp?esc(disp):dash()}</td>`;
    });

    rows += `<tr>${cells}</tr>`;
  });

  // Column group header cells
  const cgRow = [
    `<th class="cg cg-id" colspan="2">Identification</th>`,
    strCols.length  ? `<th class="cg cg-cf" colspan="${strCols.length}">Text Fields</th>` : '',
    decCols.length  ? `<th class="cg cg-cf" colspan="${decCols.length}">Number Fields</th>` : '',
    boolCols.length ? `<th class="cg cg-cf" colspan="${boolCols.length}">Boolean Fields</th>` : '',
    dateCols.length ? `<th class="cg cg-cf" colspan="${dateCols.length}">Date Fields</th>` : '',
    arrCols.length  ? `<th class="cg cg-cf" colspan="${arrCols.length}">List Fields</th>` : '',
  ].join('');

  // Human-readable column headers
  const hdrRow = [
    `<th>Code</th><th>Item Name</th>`,
    ...strCols.map(c  => `<th>${esc(c.label)}</th>`),
    ...decCols.map(c  => `<th class="r">${esc(c.label)}</th>`),
    ...boolCols.map(c => `<th style="text-align:center">${esc(c.label)}</th>`),
    ...dateCols.map(c => `<th>${esc(c.label)}</th>`),
    ...arrCols.map(c  => `<th>${esc(c.label)}</th>`),
  ].join('');

  const tbl = `<table>
    <thead>
      <tr class="cg-row">${cgRow}</tr>
      <tr class="hdr-row">${hdrRow}</tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
  document.getElementById('app').innerHTML = wrapTable(tbl, pgHTML(total, totalPages, start));
}

        <th class="cg cg-div" colspan="2">Divisions</th>
        <th class="cg cg-misc" colspan="1">Reorder</th>
      </tr>
      <tr class="hdr-row">
        <th>Code</th><th>Item Name</th><th>Unit</th><th>Status</th>
        <th class="r">Qty Owned</th><th class="r">Qty On Hand</th>
        <th class="r">To Deliver</th><th class="r">To Receive</th>
        <th class="r">Avg Cost</th><th class="r">Total Value</th>
        <th>Method</th>
        <th class="r">Purchase</th><th class="r">Sale</th>
        <th>Division</th><th>Default Div.</th>
        <th class="r">Reorder</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
  document.getElementById('app').innerHTML = wrapTable(tbl, pgHTML(total, totalPages, start));
}

/* ══════════════════════════════════
   render() — entry point from loadAllRecords
══════════════════════════════════ */
function render(items) {
  _raw = items.map(normalize);
  _page = 1;
  applyFilters();
}
