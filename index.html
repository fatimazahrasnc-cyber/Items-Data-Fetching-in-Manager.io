<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventory Items — Full View</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #07090f;
  --surface:   #0c1018;
  --panel:     #101620;
  --card:      #131b26;
  --border:    #1c2a3a;
  --border2:   #243344;
  --accent:    #38bdf8;
  --accent2:   #7dd3fc;
  --green:     #4ade80;
  --amber:     #fbbf24;
  --red:       #f87171;
  --purple:    #a78bfa;
  --teal:      #2dd4bf;
  --muted:     #3d5469;
  --text:      #c5d4e3;
  --text-dim:  #7a93a8;
  --head:      #e2edf8;
  --mono:      'JetBrains Mono', monospace;
  --sans:      'Syne', sans-serif;
}

html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 14px;
  font-size: 13px;
}

/* ── Top bar ── */
.topbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 14px; margin-bottom: 14px;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 6px 30px rgba(0,0,0,.6);
  backdrop-filter: blur(8px);
}
.topbar-brand {
  font-size: 12px; font-weight: 800; color: var(--accent);
  letter-spacing: .1em; text-transform: uppercase; white-space: nowrap;
}
.v-sep { width: 1px; height: 20px; background: var(--border2); flex-shrink: 0; }

.load-btn {
  padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-family: var(--sans); font-size: 11px; font-weight: 800;
  background: var(--accent); color: #020d18;
  transition: opacity .15s, transform .1s;
  letter-spacing: .05em; white-space: nowrap;
}
.load-btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
.load-btn:disabled { opacity: .4; cursor: not-allowed; }

.search-wrap { position: relative; min-width: 140px; max-width: 260px; flex: 1; }
.search-wrap input {
  width: 100%; padding: 6px 10px 6px 28px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text);
  font-family: var(--mono); font-size: 11px; outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--muted); pointer-events: none; }

.ctrl-select {
  padding: 6px 9px; background: var(--surface); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: var(--sans);
  font-size: 11px; outline: none; cursor: pointer;
}
.filter-btn {
  padding: 6px 11px; border: 1px solid var(--border2); border-radius: 6px;
  background: transparent; color: var(--text-dim);
  font-family: var(--sans); font-size: 11px; cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.filter-btn.on { background: var(--accent); color: #020d18; border-color: var(--accent); font-weight: 700; }

.prog-wrap { flex: 1; min-width: 60px; max-width: 140px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-bar  { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width .25s; }
.status-txt { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }

/* ── Tab bar ── */
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap;
}
.tab {
  padding: 7px 16px; border-radius: 7px 7px 0 0; border: 1px solid transparent;
  font-size: 11px; font-weight: 700; cursor: pointer; transition: all .15s;
  background: var(--panel); color: var(--text-dim); letter-spacing: .04em;
}
.tab.active { background: var(--card); border-color: var(--border2); border-bottom-color: var(--card); color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* ── Stats cards ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px; margin-bottom: 14px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 3px;
}
.stat-label { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--head); line-height: 1; }
.stat-sub   { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

/* ── Table wrapper ── */
.tbl-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.tbl-scroll { overflow-x: auto; max-height: calc(100vh - 280px); overflow-y: auto; }

table { width: 100%; border-collapse: collapse; font-size: 11px; }
thead { position: sticky; top: 0; z-index: 10; }
thead tr { background: #090e17; }
th {
  padding: 9px 12px; text-align: left;
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .1em;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap; cursor: pointer; user-select: none;
  transition: color .15s;
}
th:hover { color: var(--accent2); }
th.col-sorted { color: var(--accent); }
th.r { text-align: right; }

/* column group headers */
.col-group {
  font-size: 8px; letter-spacing: .15em; text-transform: uppercase;
  padding: 4px 12px 2px; border-bottom: none;
  background: #070b12;
}
.cg-id   { color: #3d5469; }
.cg-qty  { color: #1d5f6e; }
.cg-val  { color: #2a5a35; }
.cg-div  { color: #4a3a6e; }
.cg-cf   { color: #5a3d28; }
.cg-misc { color: #3d5469; }

tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(56,189,248,.035); }

td { padding: 8px 12px; vertical-align: middle; }

.td-name  { font-weight: 600; color: var(--head); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.td-code  { font-family: var(--mono); font-size: 10px; color: var(--accent2); white-space: nowrap; }
.td-num   { font-family: var(--mono); font-size: 11px; text-align: right; }
.td-dim   { color: var(--muted); }
.td-unit  { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

.badge {
  display: inline-block; padding: 2px 7px; border-radius: 20px;
  font-size: 9px; font-weight: 700; letter-spacing: .06em; white-space: nowrap;
}
.b-active   { background: rgba(74,222,128,.1); color: var(--green); border: 1px solid rgba(74,222,128,.2); }
.b-inactive { background: rgba(248,113,113,.1); color: var(--red);   border: 1px solid rgba(248,113,113,.2); }
.b-val      { background: rgba(56,189,248,.1);  color: var(--accent2); border: 1px solid rgba(56,189,248,.18); }
.b-div      { background: rgba(167,139,250,.1); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
.b-reorder  { background: rgba(251,191,36,.1);  color: var(--amber);  border: 1px solid rgba(251,191,36,.2); }

/* group divider rows */
.grp-row td {
  background: rgba(24,38,56,.8);
  font-size: 9px; font-weight: 700;
  color: var(--accent); text-transform: uppercase; letter-spacing: .14em;
  padding: 5px 12px;
  border-top: 1px solid var(--border2); border-bottom: 1px solid var(--border2);
}

/* custom fields panel */
.cf-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.cf-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 4px; font-size: 9px;
  background: rgba(251,191,36,.08); color: var(--amber);
  border: 1px solid rgba(251,191,36,.18);
  font-family: var(--mono);
}
.cf-tag .cf-key { color: var(--muted); }

/* division chips */
.div-chip {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 9px; background: rgba(167,139,250,.1); color: var(--purple);
  border: 1px solid rgba(167,139,250,.2); font-family: var(--mono);
}

/* no data / empty */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 13px;
}
.empty-state .icon { font-size: 38px; margin-bottom: 10px; }
.err-box {
  color: var(--red); background: rgba(248,113,113,.07);
  border: 1px solid rgba(248,113,113,.2);
  border-radius: 8px; padding: 14px 18px; font-size: 12px; margin-bottom: 14px;
}

/* pagination */
.pagination {
  display: flex; align-items: center; justify-content: flex-end; gap: 6px;
  padding: 10px 14px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); flex-wrap: wrap;
}
.pg-btn {
  padding: 4px 10px; border: 1px solid var(--border2);
  border-radius: 5px; background: transparent; color: var(--text-dim);
  font-family: var(--sans); font-size: 11px; cursor: pointer; transition: all .15s;
}
.pg-btn:hover:not(:disabled) { background: var(--border2); color: var(--text); }
.pg-btn:disabled { opacity: .3; cursor: not-allowed; }
.pg-btn.cur { background: var(--accent); color: #020d18; border-color: var(--accent); font-weight: 700; }
.pg-dots { color: var(--muted); }

/* section heading for divisions/CF tab */
.section-title {
  font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .12em;
  padding: 14px 16px 6px; border-bottom: 1px solid var(--border);
}

/* tooltip on truncated */
[title] { cursor: help; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── Control bar ── -->
<div class="topbar">
  <span class="topbar-brand">📦 Inventory</span>
  <div class="v-sep"></div>
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search name / code…" oninput="applyFilters()" disabled>
  </div>

  <select class="ctrl-select" id="sort-select" onchange="applyFilters()" disabled>
    <option value="name-asc">Name A→Z</option>
    <option value="name-desc">Name Z→A</option>
    <option value="code-asc">Code A→Z</option>
    <option value="val-desc">Valuation Method ↓</option>
    <option value="qty-desc">Qty Desired ↓</option>
    <option value="sale-desc">Sale Price ↓</option>
    <option value="purchase-desc">Purchase Price ↓</option>
  </select>

  <button class="filter-btn" id="f-active"  onclick="toggleF('active')"  disabled>Active Only</button>
  <button class="filter-btn" id="f-reorder" onclick="toggleF('reorder')" disabled>Reorder Set</button>
  <button class="filter-btn" id="f-hasdiv"  onclick="toggleF('hasdiv')"  disabled>Has Division</button>
  <button class="filter-btn" id="f-hascf"   onclick="toggleF('hascf')"   disabled>Has Custom Fields</button>

  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data</span>
</div>

<!-- ── Stats ── -->
<div class="stats-grid" id="stats-grid" style="display:none"></div>

<!-- ── Tabs ── -->
<div class="tab-bar" id="tab-bar" style="display:none">
  <div class="tab active" onclick="switchTab('inventory')">📊 Inventory Quantities</div>
  <div class="tab" onclick="switchTab('pricing')">💰 Pricing & Valuation</div>
  <div class="tab" onclick="switchTab('divisions')">🏢 Divisions</div>
  <div class="tab" onclick="switchTab('customfields')">🏷 Custom Fields</div>
  <div class="tab" onclick="switchTab('all')">⚙ All Fields</div>
</div>

<!-- ── Content ── -->
<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getInventoryItemBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
   Manager.io returns ≤50 records per call.
   This loop follows next_page_token until
   every record is loaded.
══════════════════════════════════ */
async function getInventoryItemBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/inventory-item-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/inventory-item-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   State
══════════════════════════════════ */
let _raw      = [];     // all loaded records
let _filtered = [];     // after filters/sort
let _page     = 1;
let _tab      = 'inventory';
const PAGE_SIZE = 50;
const _filters = { active: false, reorder: false, hasdiv: false, hascf: false };

/* ══════════════════════════════════
   Helpers
══════════════════════════════════ */
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const num = (v, d=0) => v != null ? Number(v).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d }) : null;
const price = v => v != null && v !== 0 ? num(v, 2) : null;
const dash  = s => s != null && s !== '' ? s : '<span class="td-dim">—</span>';
const VALUATION = { 1: 'Avg Cost', 2: 'FIFO', 3: 'LIFO', 4: 'Specific ID' };

/* Normalize a raw API record into a flat item object */
function normalize(raw) {
  const it = raw?.item ?? raw;
  const cf2 = it?.customFields2 ?? {};
  const hasCF = !!(
    (cf2.strings && Object.keys(cf2.strings).length) ||
    (cf2.decimals && Object.keys(cf2.decimals).length) ||
    (cf2.dates    && Object.keys(cf2.dates).length) ||
    (cf2.booleans && Object.keys(cf2.booleans).length) ||
    (cf2.stringArrays && Object.keys(cf2.stringArrays).length) ||
    it?.customFields
  );
  return {
    key:            raw?.key ?? null,
    itemCode:       it?.itemCode   ?? null,
    itemName:       it?.itemName   ?? it?.nameWithCode ?? it?.text ?? '(Unnamed)',
    unitName:       it?.unitName   ?? null,
    valuationMethod: it?.valuationMethod ?? null,
    inactive:       it?.inactive   ?? false,
    reorderPoint:   it?.reorderPoint ?? false,
    qtyDesired:     it?.qtyDesired ?? 0,

    // Inventory qty fields (API may not populate all for every endpoint — show if present)
    qtyOwned:       it?.qtyOwned          ?? it?.quantityOwned       ?? null,
    qtyOnHand:      it?.qtyOnHand         ?? it?.quantityOnHand      ?? null,
    qtyToDeliver:   it?.qtyToDeliver      ?? it?.quantityToDeliver   ?? null,
    qtyToReceive:   it?.qtyToReceive      ?? it?.quantityToReceive   ?? null,
    averageCost:    it?.averageCost        ?? it?.unitCost            ?? (it?.obsolete_StartingBalanceAverageCost2 !== 0 ? it?.obsolete_StartingBalanceAverageCost2 : null) ?? null,
    totalValue:     it?.totalValue        ?? it?.inventoryValue      ?? null,

    // Pricing
    defPurchasePrice: it?.hasDefaultPurchaseUnitPrice ? (it?.defaultPurchaseUnitPrice ?? 0) : null,
    defSalePrice:     it?.hasDefaultSalesUnitPrice    ? (it?.defaultSalesUnitPrice    ?? 0) : null,
    defaultQty:       it?.hasDefaultQty ? (it?.defaultQty ?? 0) : null,

    // Division
    division:       it?.division    ?? null,
    defaultDivision: it?.hasDefaultDivision ? it?.defaultDivision : null,
    divisionEnabled: it?.divisionEnabled ?? false,

    // Accounts
    incomeAccount:  it?.customIncomeAccount  ? it?.incomeAccount  : null,
    expenseAccount: it?.customExpenseAccount ? it?.expenseAccount : null,
    controlAccount: it?.controlAccount ?? null,

    // Custom fields
    customFields:   it?.customFields  ?? null,
    cf2Strings:     cf2.strings       ?? null,
    cf2Decimals:    cf2.decimals      ?? null,
    cf2Dates:       cf2.dates         ?? null,
    cf2Booleans:    cf2.booleans      ?? null,
    cf2StringArrays:cf2.stringArrays  ?? null,
    hasCF,

    // Flags
    hasCOGS:        it?.hasCostOfGoodsSold ?? false,
    taxEnabled:     it?.taxCodeEnabled     ?? false,
    projectEnabled: it?.projectEnabled     ?? false,
    defaultLineDesc: it?.hasDefaultLineDescription ? it?.defaultLineDescription : null,
    defaultTaxCode: it?.hasDefaultTaxCode ? it?.defaultTaxCode : null,
  };
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true; btn.textContent = 'Loading…';
  bar.style.width = '0%'; app.innerHTML = '';
  document.getElementById('stats-grid').style.display = 'none';
  document.getElementById('tab-bar').style.display = 'none';
  ['search-input','sort-select','f-active','f-reorder','f-hasdiv','f-hascf'].forEach(id => {
    const el = document.getElementById(id); if (el) el.disabled = true;
  });

  try {
    const raw = await getInventoryItemBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()}`
        : `Page ${page} · ${loaded.toLocaleString()} records…`;
      if (total) bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
    });

    bar.style.width = '100%';
    status.textContent = `✓ ${raw.length.toLocaleString()} records loaded`;
    btn.textContent = '↺ Reload'; btn.disabled = false;

    ['search-input','sort-select','f-active','f-reorder','f-hasdiv','f-hascf'].forEach(id => {
      const el = document.getElementById(id); if (el) el.disabled = false;
    });
    document.getElementById('tab-bar').style.display = 'flex';

    _raw = raw.map(normalize);
    _page = 1;
    applyFilters();

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry'; btn.disabled = false;
    app.innerHTML = `<div class="err-box">⚠ ${esc(err.message)}<br><small>Make sure this is running inside Manager.io</small></div>`;
  }
}

/* ══════════════════════════════════
   Filter / sort
══════════════════════════════════ */
function toggleF(key) {
  _filters[key] = !_filters[key];
  const el = document.getElementById('f-' + key);
  if (el) el.classList.toggle('on', _filters[key]);
  _page = 1; applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
  const sortKey = document.getElementById('sort-select')?.value || 'name-asc';

  let list = _raw.filter(i => {
    if (_filters.active  && i.inactive) return false;
    if (_filters.reorder && !i.reorderPoint) return false;
    if (_filters.hasdiv  && !i.division && !i.defaultDivision) return false;
    if (_filters.hascf   && !i.hasCF) return false;
    if (q && !(i.itemName.toLowerCase().includes(q) || (i.itemCode||'').toLowerCase().includes(q))) return false;
    return true;
  });

  list.sort((a, b) => {
    switch (sortKey) {
      case 'name-asc':      return a.itemName.localeCompare(b.itemName);
      case 'name-desc':     return b.itemName.localeCompare(a.itemName);
      case 'code-asc':      return (a.itemCode||'zzz').localeCompare(b.itemCode||'zzz');
      case 'val-desc':      return (b.valuationMethod??0) - (a.valuationMethod??0);
      case 'qty-desc':      return (b.qtyDesired??0) - (a.qtyDesired??0);
      case 'sale-desc':     return (b.defSalePrice??-Infinity) - (a.defSalePrice??-Infinity);
      case 'purchase-desc': return (b.defPurchasePrice??-Infinity) - (a.defPurchasePrice??-Infinity);
      default:              return a.itemName.localeCompare(b.itemName);
    }
  });

  _filtered = list;
  renderStats();
  renderContent();
}

/* ══════════════════════════════════
   Stats
══════════════════════════════════ */
function renderStats() {
  const total    = _raw.length;
  const active   = _raw.filter(i => !i.inactive).length;
  const reorder  = _raw.filter(i => i.reorderPoint).length;
  const hasDivs  = _raw.filter(i => i.division || i.defaultDivision).length;
  const hasCFs   = _raw.filter(i => i.hasCF).length;
  const shown    = _filtered.length;

  const sg = document.getElementById('stats-grid');
  sg.style.display = 'grid';
  sg.innerHTML = [
    ['Total Items',    total,                 'all records',           'var(--head)'],
    ['Active',         active,                `${total>0?Math.round(active/total*100):0}% of total`, 'var(--green)'],
    ['Inactive',       total - active,        'hidden from use',       'var(--red)'],
    ['Reorder Set',    reorder,               'have reorder point',    'var(--amber)'],
    ['With Division',  hasDivs,               'have division assigned','var(--purple)'],
    ['Custom Fields',  hasCFs,                'have custom data',      'var(--teal)'],
    ['Showing',        shown,                 'after filters',         'var(--accent2)'],
  ].map(([label, val, sub, color]) => `
    <div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value" style="color:${color}">${Number(val).toLocaleString()}</div>
      <div class="stat-sub">${sub}</div>
    </div>`).join('');
}

/* ══════════════════════════════════
   Tab switch
══════════════════════════════════ */
function switchTab(tab) {
  _tab = tab; _page = 1;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  const tabs = ['inventory','pricing','divisions','customfields','all'];
  const idx = tabs.indexOf(tab);
  document.querySelectorAll('.tab')[idx]?.classList.add('active');
  renderContent();
}

function renderContent() {
  switch (_tab) {
    case 'inventory':   renderInventoryTab(); break;
    case 'pricing':     renderPricingTab();   break;
    case 'divisions':   renderDivisionsTab(); break;
    case 'customfields':renderCFTab();        break;
    case 'all':         renderAllTab();       break;
  }
}

/* ══════════════════════════════════
   Pagination helpers
══════════════════════════════════ */
function pageSlice() {
  const total = _filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (_page > totalPages) _page = totalPages;
  const start = (_page - 1) * PAGE_SIZE;
  return { items: _filtered.slice(start, start + PAGE_SIZE), start, total, totalPages };
}

function paginationHTML(total, totalPages, start) {
  if (totalPages <= 1) return '';
  const p = _page, maxB = 7;
  let ps = Math.max(1, p - 3), pe = Math.min(totalPages, ps + maxB - 1);
  if (pe - ps < maxB - 1) ps = Math.max(1, pe - maxB + 1);
  let btns = '';
  if (ps > 1) btns += `<button class="pg-btn" onclick="goPage(1)">1</button>${ps>2?'<span class="pg-dots">…</span>':''}`;
  for (let i = ps; i <= pe; i++) btns += `<button class="pg-btn${i===p?' cur':''}" onclick="goPage(${i})">${i}</button>`;
  if (pe < totalPages) btns += `${pe<totalPages-1?'<span class="pg-dots">…</span>':''}<button class="pg-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;

  return `<div class="pagination">
    <span>Rows ${start+1}–${Math.min(start+PAGE_SIZE, total)} of ${total.toLocaleString()}</span>
    <button class="pg-btn" onclick="goPage(${p-1})" ${p<=1?'disabled':''}>← Prev</button>
    ${btns}
    <button class="pg-btn" onclick="goPage(${p+1})" ${p>=totalPages?'disabled':''}>Next →</button>
  </div>`;
}

function goPage(p) {
  const tp = Math.max(1, Math.ceil(_filtered.length / PAGE_SIZE));
  _page = Math.max(1, Math.min(p, tp));
  renderContent();
  document.getElementById('app')?.scrollIntoView({ behavior: 'smooth' });
}

function emptyOrTable(content, pagination) {
  if (!_filtered.length) return `<div class="tbl-wrap"><div class="empty-state"><div class="icon">📭</div><div>${_raw.length?'No items match filters.':'No data loaded yet.'}</div></div></div>`;
  return `<div class="tbl-wrap"><div class="tbl-scroll">${content}</div>${pagination}</div>`;
}

/* ── Group letter header helper ── */
function groupRow(name, colspan) {
  const ch = (name||'?')[0].toUpperCase();
  const g = /[A-Z]/.test(ch) ? ch : '#';
  return `<tr class="grp-row"><td colspan="${colspan}">— ${g} —</td></tr>`;
}

/* ══════════════════════════════════
   Tab: Custom Fields
══════════════════════════════════ */
function renderCFTab() {
  const { items, start, total, totalPages } = pageSlice();
  let rows = '', lastG = '';
  const sortKey = document.getElementById('sort-select')?.value || 'name-asc';
  const grouped = sortKey === 'name-asc';

  // Collect all cf2 keys across dataset to build dynamic columns
  const allStrKeys  = new Set(), allDecKeys = new Set(), allBoolKeys = new Set(), allDateKeys = new Set();
  _filtered.forEach(i => {
    Object.keys(i.cf2Strings  || {}).forEach(k => allStrKeys.add(k));
    Object.keys(i.cf2Decimals || {}).forEach(k => allDecKeys.add(k));
    Object.keys(i.cf2Booleans || {}).forEach(k => allBoolKeys.add(k));
    Object.keys(i.cf2Dates    || {}).forEach(k => allDateKeys.add(k));
  });
  const strKeys  = [...allStrKeys];
  const decKeys  = [...allDecKeys];
  const boolKeys = [...allBoolKeys];
  const dateKeys = [...allDateKeys];
  const hasAnyCF = strKeys.length || decKeys.length || boolKeys.length || dateKeys.length;

  if (!hasAnyCF) {
    // No custom fields in data — show note
    document.getElementById('app').innerHTML = `<div class="tbl-wrap">
      <div class="empty-state">
        <div class="icon">🏷</div>
        <div style="margin-bottom:8px">No custom fields found in loaded data.</div>
        <div style="font-size:11px;color:var(--text-dim)">Custom fields appear here when items have customFields2 data populated.</div>
      </div>
    </div>`;
    return;
  }

  items.forEach(i => {
    if (grouped) {
      const g = /[A-Z]/i.test((i.itemName||'?')[0]) ? i.itemName[0].toUpperCase() : '#';
      if (g !== lastG) { rows += groupRow(i.itemName, 2 + strKeys.length + decKeys.length + boolKeys.length + dateKeys.length); lastG = g; }
    }

    let cells = `
      <td class="td-code">${i.itemCode ? esc(i.itemCode) : '<span class="td-dim">—</span>'}</td>
      <td class="td-name" title="${esc(i.itemName)}">${esc(i.itemName)}</td>`;

    strKeys.forEach(k => {
      const v = i.cf2Strings?.[k]; cells += `<td>${v != null ? `<span class="cf-tag"><span class="cf-key">${esc(k)}</span>${esc(v)}</span>` : '<span class="td-dim">—</span>'}</td>`;
    });
    decKeys.forEach(k => {
      const v = i.cf2Decimals?.[k]; cells += `<td class="td-num">${v != null ? num(v, 2) : '<span class="td-dim">—</span>'}</td>`;
    });
    boolKeys.forEach(k => {
      const v = i.cf2Booleans?.[k]; cells += `<td style="text-align:center">${v != null ? (v ? '✓' : '✗') : '<span class="td-dim">—</span>'}</td>`;
    });
    dateKeys.forEach(k => {
      const v = i.cf2Dates?.[k]; cells += `<td style="font-size:10px;font-family:var(--mono)">${v ? esc(v) : '<span class="td-dim">—</span>'}</td>`;
    });

    rows += `<tr>${cells}</tr>`;
  });

  const colSpans = [
    strKeys.length  ? `<th class="col-group cg-cf" colspan="${strKeys.length}">Text Fields</th>` : '',
    decKeys.length  ? `<th class="col-group cg-cf" colspan="${decKeys.length}">Numeric Fields</th>` : '',
    boolKeys.length ? `<th class="col-group cg-cf" colspan="${boolKeys.length}">Boolean Fields</th>` : '',
    dateKeys.length ? `<th class="col-group cg-cf" colspan="${dateKeys.length}">Date Fields</th>` : '',
  ].join('');

  const colHeaders = [
    ...strKeys.map(k  => `<th>${esc(k)}</th>`),
    ...decKeys.map(k  => `<th class="r">${esc(k)}</th>`),
    ...boolKeys.map(k => `<th style="text-align:center">${esc(k)}</th>`),
    ...dateKeys.map(k => `<th>${esc(k)}</th>`),
  ].join('');

  const tbl = `<table>
    <thead>
      <tr>
        <th class="col-group cg-id" colspan="2">Identification</th>
        ${colSpans}
      </tr>
      <tr>
        <th>Code</th>
        <th>Item Name</th>
        ${colHeaders}
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;

  document.getElementById('app').innerHTML = emptyOrTable(tbl, paginationHTML(total, totalPages, start));
}
