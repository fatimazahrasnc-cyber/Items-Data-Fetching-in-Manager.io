<style>

  --border2:   #c8d0dc;
  --accent:    #1d6fce;

  --amber-lt:  #fff8c5;
  --purple:    #6639ba;

body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 14px; font-size: 13px; }

/* ── Topbar ── */

.load-btn {

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getInventoryItemBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
   Manager.io returns ≤50 records per call.
   This loop follows next_page_token until
   every record is loaded.
══════════════════════════════════ */
async function getInventoryItemBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/inventory-item-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/inventory-item-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Generic paginated fetcher
══════════════════════════════════ */
async function fetchAllPages(path) {
  const all = [];
  let nextToken = null;
  let pageNum = 0;
  do {
    const sep = path.includes('?') ? '&' : '?';
    const url = nextToken ? `${path}${sep}next_page_token=${encodeURIComponent(nextToken)}` : path;
    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path: url });
    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    all.push(...page);
    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;
    pageNum++;
    if (pageNum >= 500) break;
  } while (nextToken);
  return all;
}

/* ══════════════════════════════════
   Safe single fetch (doesn't throw)
══════════════════════════════════ */
async function tryFetch(path) {
  try {
    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });
    return { ok: true, data };
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

/* ══════════════════════════════════
   State
══════════════════════════════════ */
let _raw      = [];
let _filtered = [];
let _page     = 1;
let _tab      = 'inventory';
const PAGE_SIZE = 50;
const _filters  = { active: false, reorder: false, hasdiv: false, negqty: false };

let _cfKeyToName  = {};
let _divKeyToInfo = {};
let _qtySource    = '';

const VALUATION = { 1: 'Average Cost', 2: 'FIFO', 3: 'LIFO', 4: 'Specific ID' };

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const num = (v, d=0) => v!=null ? Number(v).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}) : null;

function numCell(v, d=2, greenPos=false) {
  if (v === null || v === undefined) return `<span class="td-dim">—</span>`;
  const n = Number(v);
  const f = num(n, d);
  if (n < 0) return `<span class="neg">${f}</span>`;
  if (greenPos && n > 0) return `<span style="color:var(--green);font-weight:600">${f}</span>`;
  return f;
}

function showInfoBar(msg, type='ok') {
  document.getElementById('info-bar-container').innerHTML =
    `<div class="info-bar ${type}">${msg}</div>`;
}

function cfLabel(key) {
  return _cfKeyToName[key] ?? _cfKeyToName[key?.toLowerCase()] ?? key;
}

function resolveDiv(val) {
  if (val == null) return null;
  if (typeof val === 'string') return _divKeyToInfo[val] ?? _divKeyToInfo[val.toLowerCase()] ?? { name: val, code: null };
  if (typeof val === 'object') {
    const k = val.key ?? val.id ?? '';
    return _divKeyToInfo[k] ?? _divKeyToInfo[k.toLowerCase?.()] ?? { name: val.name ?? val.text ?? k, code: val.code ?? null };
  }
  return null;
}

/* ══════════════════════════════════
   QUANTITY FETCHING STRATEGY
   
   Based on your screenshot, Manager stores
   quantities in "Inventory Quantity Summary"
   which is a REPORT accessed via:
     GET /api4/reports   (list all reports)
     GET /api4/report/{key}  (get report data)
   
   We also try the inventory-item self links
   since those show individual item detail.
══════════════════════════════════ */

/* Build a qty map from any data structure that contains item names/codes + qty fields */
function parseQtyFromRows(rows, itemsByCode, itemsByName) {
  const qtyMap = {}; // itemKey → { qtyOwned, qtyOnHand, qtyToDeliver, qtyToReceive, averageCost, totalValue }
  let matched = 0;

  rows.forEach(row => {
    // Manager report rows can have many shapes — probe all possibilities
    const src = row?.item ?? row?.data ?? row;

    // Try to identify which inventory item this row refers to
    // Could be: { key: uuid } or { itemCode: "..." } or { name: "Item Name - Code" } or { inventoryItem: uuid }
    let itemKey = null;

    // Direct key reference
    const directKey = row?.key ?? src?.inventoryItem ?? src?.inventoryItemKey ?? src?.item?.key;
    if (directKey && typeof directKey === 'string' && directKey.includes('-')) {
      itemKey = directKey;
    }

    // Match by item code embedded in name like "GT+LMT-028 - All Time 10KG"
    if (!itemKey) {
      const nameField = src?.name ?? src?.itemName ?? src?.description ?? src?.account ?? src?.text ?? '';
      const nameStr = typeof nameField === 'string' ? nameField : (nameField?.name ?? nameField?.text ?? '');
      if (nameStr) {
        // Try "CODE - Name" pattern (Manager's nameWithCode format)
        const dashIdx = nameStr.indexOf(' - ');
        if (dashIdx > 0) {
          const possibleCode = nameStr.substring(0, dashIdx).trim();
          if (itemsByCode[possibleCode]) itemKey = itemsByCode[possibleCode];
        }
        // Try direct name match
        if (!itemKey && itemsByName[nameStr.trim()]) itemKey = itemsByName[nameStr.trim()];
        // Try nameWithCode match
        if (!itemKey) {
          for (const [code, key] of Object.entries(itemsByCode)) {
            if (nameStr.includes(code)) { itemKey = key; break; }
          }
        }
      }
    }

    if (!itemKey) return;

    // Now extract qty fields — Manager report uses various field names
    const qtyOwned     = src?.qtyOwned     ?? src?.quantityOwned     ?? src?.owned        ?? src?.balance    ??
                         src?.closingBalance ?? src?.closing_balance  ?? null;
    const qtyOnHand    = src?.qtyOnHand    ?? src?.quantityOnHand    ?? src?.onHand        ?? src?.inStock    ??
                         src?.stock        ?? src?.quantityInStock    ?? null;
    const qtyToDeliver = src?.qtyToDeliver ?? src?.quantityToDeliver ?? src?.toDeliver     ??
                         src?.committed    ?? src?.sales              ?? null;
    const qtyToReceive = src?.qtyToReceive ?? src?.quantityToReceive ?? src?.toReceive     ??
                         src?.purchases    ?? src?.onOrder            ?? null;
    const averageCost  = src?.averageCost  ?? src?.averageUnitCost   ?? src?.unitCost      ??
                         src?.avgCost      ?? null;
    const totalValue   = src?.totalValue   ?? src?.inventoryValue    ?? src?.value         ??
                         src?.amount       ?? null;

    // Only record if at least one qty field has data
    if (qtyOwned!==null || qtyOnHand!==null || qtyToDeliver!==null || qtyToReceive!==null || averageCost!==null) {
      qtyMap[itemKey] = { qtyOwned, qtyOnHand, qtyToDeliver, qtyToReceive, averageCost, totalValue };
      matched++;
    }
  });

  return { qtyMap, matched };
}

/* ══════════════════════════════════
   fetchReportList — get all available reports
   Then find inventory-related ones
══════════════════════════════════ */
async function fetchReportList() {
  // Try the reports batch endpoint
  const endpoints = [
    '/api4/report-batch',
    '/api4/reports',
    '/api4/report',
  ];
  for (const ep of endpoints) {
    try {
      const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path: ep });
      const rows = Array.isArray(data) ? data : (data.items || data.data || data.reports || []);
      if (rows.length > 0) return { endpoint: ep, rows };
    } catch(e) {}
  }
  return null;
}

/* ══════════════════════════════════
   fetchInventoryQtyFromReports
   Fetches the report list, finds inventory
   quantity reports, fetches their data,
   and parses quantities from rows.
══════════════════════════════════ */
async function fetchInventoryQtyFromReports(itemsByCode, itemsByName, onStatus) {
  onStatus('Fetching report list…');
  const reportList = await fetchReportList();

  if (!reportList) {
    onStatus('Report list endpoint not found.');
    return null;
  }

  const { rows: reports } = reportList;
  onStatus(`Found ${reports.length} reports — searching for inventory quantity reports…`);

  // Filter to inventory-related reports
  const inventoryReports = reports.filter(r => {
    const name = (r?.item?.name ?? r?.name ?? r?.title ?? '').toLowerCase();
    return name.includes('inventory') && (
      name.includes('quantity') || name.includes('qty') ||
      name.includes('stock') || name.includes('balance') || name.includes('summary')
    );
  });

  if (!inventoryReports.length) {
    // Try ALL reports if no inventory-specific ones found
    onStatus('No inventory reports found by name — trying all reports…');
    inventoryReports.push(...reports.slice(0, 20)); // limit to first 20
  }

  // Try fetching each inventory report
  for (const report of inventoryReports) {
    const reportKey = report?.key ?? report?.id;
    const reportName = report?.item?.name ?? report?.name ?? report?.title ?? reportKey;
    onStatus(`Trying report: ${reportName}…`);

    if (!reportKey) continue;

    // Reports can be fetched via different paths
    const reportPaths = [
      `/api4/report/${reportKey}`,
      `/api4/reports/${reportKey}`,
      `/api4/report-batch/${reportKey}`,
      `/api4/report?key=${reportKey}`,
    ];

    for (const rPath of reportPaths) {
      try {
        const rData = await postMessageWithResponse({ type: 'api-request', method: 'GET', path: rPath });
        // Report data can be in many shapes
        const rows = Array.isArray(rData)
          ? rData
          : (rData?.rows ?? rData?.data ?? rData?.items ?? rData?.lines ??
             rData?.report?.rows ?? rData?.result ?? []);

        if (!rows.length) continue;

        const { qtyMap, matched } = parseQtyFromRows(rows, itemsByCode, itemsByName);
        if (matched > 0) {
          return { source: `Report: ${reportName}`, qtyMap, matched, totalRows: rows.length };
        }

        // Even if not matched by key, show what fields we got for debugging
      } catch(e) {}
    }
  }
  return null;
}

/* ══════════════════════════════════
   fetchInventoryQtyFromItemDetail
   Falls back to fetching each item's detail
   page via its self link (guaranteed to work
   but slower for large catalogs)
══════════════════════════════════ */
async function fetchInventoryQtyFromItemDetail(onStatus) {
  const itemsWithSelf = _raw.filter(i => i._selfHref);
  if (!itemsWithSelf.length) return null;

  onStatus(`Fetching item details (${itemsWithSelf.length} items)…`);
  let fetched = 0;
  const qtyMap = {};

  for (const item of itemsWithSelf) {
    try {
      const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path: item._selfHref });
      const src = data?.item ?? data;
      // Check every field for qty-like data
      const keys = Object.keys(src ?? {});
      const qtyKeys = keys.filter(k => {
        const kl = k.toLowerCase();
        return kl.includes('qty') || kl.includes('quantity') || kl.includes('owned') ||
               kl.includes('onhand') || kl.includes('deliver') || kl.includes('receive') ||
               kl.includes('stock') || kl.includes('balance') || kl.includes('value') ||
               kl.includes('cost');
      });
      if (qtyKeys.length > 0) {
        const entry = {};
        qtyKeys.forEach(k => { entry[k] = src[k]; });
        // Map to standard names
        qtyMap[item.key] = {
          qtyOwned:     src?.qtyOwned     ?? src?.quantityOwned  ?? src?.owned    ?? src?.balance ?? null,
          qtyOnHand:    src?.qtyOnHand    ?? src?.quantityOnHand ?? src?.onHand   ?? src?.stock   ?? null,
          qtyToDeliver: src?.qtyToDeliver ?? src?.toDeliver      ?? src?.sales    ?? null,
          qtyToReceive: src?.qtyToReceive ?? src?.toReceive      ?? src?.purchases ?? null,
          averageCost:  src?.averageCost  ?? src?.unitCost       ?? src?.avgCost  ?? null,
          totalValue:   src?.totalValue   ?? src?.inventoryValue ?? src?.value    ?? null,
          _rawFields:   entry, // keep raw for debugging
        };
      }
    } catch(e) {}
    fetched++;
    if (fetched % 5 === 0) onStatus(`Fetching item details… ${fetched}/${itemsWithSelf.length}`);
  }

  const matched = Object.keys(qtyMap).length;
  return matched > 0 ? { source: 'Item detail self-links', qtyMap, matched } : null;
}

/* ══════════════════════════════════
   applyQtyMap — merge qty data into _raw
══════════════════════════════════ */
function applyQtyMap(qtyMap) {
  _raw.forEach(i => {
    if (!i.key || !qtyMap[i.key]) return;
    const q = qtyMap[i.key];
    if (q.qtyOwned     !== null) i.qtyOwned     = q.qtyOwned;
    if (q.qtyOnHand    !== null) i.qtyOnHand    = q.qtyOnHand;
    if (q.qtyToDeliver !== null) i.qtyToDeliver = q.qtyToDeliver;
    if (q.qtyToReceive !== null) i.qtyToReceive = q.qtyToReceive;
    if (q.averageCost  !== null) i.averageCost  = q.averageCost;
    if (q.totalValue   !== null) i.totalValue   = q.totalValue;
  });
}

    '/api4/inventory-stock-batch', '/api4/inventory-value-batch',

/* Fetch a specific report and try to extract qty data */
window.fetchAndShowReport = async function(key, name) {
  showInfoBar(`⏳ Fetching report: ${name}…`, 'teal');
  const paths = [`/api4/report/${key}`, `/api4/reports/${key}`];
  for (const p of paths) {
    try {
      const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path: p });
      const rows = Array.isArray(data) ? data : (data?.rows ?? data?.data ?? data?.items ?? data?.lines ?? []);

      // Build lookup maps
      const byCode = {}, byName = {};
      _raw.forEach(i => {
        if (i.itemCode) byCode[i.itemCode] = i.key;
        if (i.itemName) byName[i.itemName] = i.key;
      });

      const { qtyMap, matched } = parseQtyFromRows(rows, byCode, byName);

      if (matched > 0) {
        applyQtyMap(qtyMap);
        _qtySource = `Report: ${name} (${matched} matched)`;
        showInfoBar(`✓ Quantities loaded from "${name}" — ${matched} items matched from ${rows.length} rows`, 'ok');
        applyFilters();
      } else {
        // Show raw structure for debugging
        const sample = JSON.stringify(rows.slice(0,3), null, 2);
        showInfoBar(`⚠ Report fetched (${rows.length} rows) but couldn't match items. Check console for structure.`, 'warn');
        // Show the raw data in discovery panel
        const disc = document.getElementById('disc-body');
        if (disc) disc.innerHTML += `<div style="margin-top:12px;font-weight:700">Raw sample from "${name}":</div><div class="ep-sample" style="max-height:200px">${esc(sample)}</div>`;
      }
      return;
    } catch(e) {}
  }
  showInfoBar(`✗ Could not fetch report "${name}"`, 'warn');
};

/* ══════════════════════════════════
   fetchMetadata
══════════════════════════════════ */
async function fetchMetadata() {
  const cfEndpoints = [
    '/api4/text-custom-field-batch', '/api4/number-custom-field-batch',
    '/api4/date-custom-field-batch', '/api4/checkbox-custom-field-batch',
    '/api4/dropdown-custom-field-batch',
  ];
  const results = await Promise.allSettled(cfEndpoints.map(ep => fetchAllPages(ep)));
  results.forEach(r => {
    if (r.status !== 'fulfilled') return;
    r.value.forEach(row => {
      const key = row?.key, name = row?.item?.name ?? row?.name;
      if (key && name) { _cfKeyToName[key] = name; _cfKeyToName[key.toLowerCase()] = name; }
    });
  });
  try {
    const divRows = await fetchAllPages('/api4/division-batch');
    divRows.forEach(row => {
      const key = row?.key, name = row?.item?.name ?? row?.name, code = row?.item?.code ?? row?.code;
      if (key && name) { _divKeyToInfo[key] = { name, code }; _divKeyToInfo[key.toLowerCase()] = { name, code }; }
    });
  } catch(e) {}
}

/* ══════════════════════════════════
   Normalize raw item
══════════════════════════════════ */
function normalize(raw) {
  const it  = raw?.item ?? raw;
  const cf2 = it?.customFields2 ?? {};
  const key = raw?.key ?? null;

  const cfStrings      = cf2.strings      ?? {};
  const cfDecimals     = cf2.decimals     ?? {};
  const cfDates        = cf2.dates        ?? {};
  const cfBooleans     = cf2.booleans     ?? {};
  const cfStringArrays = cf2.stringArrays ?? {};
  const hasCF = !!(Object.keys(cfStrings).length||Object.keys(cfDecimals).length||Object.keys(cfDates).length||Object.keys(cfBooleans).length||Object.keys(cfStringArrays).length);

  return {
    key,
    _selfHref: raw?._links?.self?.href ?? null,
    itemCode:  it?.itemCode ?? null,
    itemName:  it?.itemName ?? it?.nameWithCode ?? it?.text ?? '(Unnamed)',
    unitName:  it?.unitName ?? null,
    valuationMethod: it?.valuationMethod ?? null,
    inactive:  it?.inactive  ?? false,
    reorderPoint: it?.reorderPoint ?? false,
    qtyDesired: it?.qtyDesired ?? 0,

    // Quantities — null initially, filled by qty fetch
    qtyOwned:     null,
    qtyOnHand:    null,
    qtyToDeliver: null,
    qtyToReceive: null,
    averageCost:  it?.obsolete_StartingBalanceAverageCost2 > 0 ? it.obsolete_StartingBalanceAverageCost2 : null,
    totalValue:   null,

    // Pricing
    defPurchasePrice: it?.hasDefaultPurchaseUnitPrice ? (it?.defaultPurchaseUnitPrice ?? 0) : null,
    defSalePrice:     it?.hasDefaultSalesUnitPrice    ? (it?.defaultSalesUnitPrice    ?? 0) : null,
    defaultQty:       it?.hasDefaultQty ? (it?.defaultQty ?? 0) : null,
    defaultLineDesc:  it?.hasDefaultLineDescription ? it?.defaultLineDescription : null,

    // Division
    division:        resolveDiv(it?.division),
    defaultDivision: it?.hasDefaultDivision ? resolveDiv(it?.defaultDivision) : null,
    divisionEnabled: it?.divisionEnabled ?? false,

    incomeAccountName:  it?.customIncomeAccount  ? resolveDiv(it?.incomeAccount)?.name  : null,
    expenseAccountName: it?.customExpenseAccount ? resolveDiv(it?.expenseAccount)?.name : null,
    controlAccountName: resolveDiv(it?.controlAccount)?.name ?? null,

    cfStrings, cfDecimals, cfDates, cfBooleans, cfStringArrays,
    hasCF,
  };
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn = document.getElementById('load-btn');
  const bar = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true; btn.textContent = 'Loading…';
  bar.style.width = '0%';
  document.getElementById('app-init').innerHTML = '';
  document.getElementById('stats-grid').style.display = 'none';
  document.getElementById('tabs-container').style.display = 'none';
  document.getElementById('info-bar-container').innerHTML = '';

  const ctrlIds = ['search-input','sort-select','f-active','f-reorder','f-hasdiv','f-negqty'];
  ctrlIds.forEach(id => { const el=document.getElementById(id); if(el) el.disabled=true; });

  try {
    // Phase 1: Items + metadata in parallel
    status.textContent = 'Fetching items & definitions…';
    const [rawItems] = await Promise.all([
      getInventoryItemBatch((loaded, total, page) => {
        status.textContent = total
          ? `Items: ${loaded.toLocaleString()} / ${total.toLocaleString()}`
          : `Items: ${loaded.toLocaleString()} loaded…`;
        if (total) bar.style.width = Math.min(50, Math.round(loaded/total*50)) + '%';
      }),
      fetchMetadata(),
    ]);
    bar.style.width = '55%';

    _raw = rawItems.map(r => normalize(r));

    // Build lookup maps for qty matching
    const byCode = {}, byName = {};
    _raw.forEach(i => {
      if (i.itemCode) byCode[i.itemCode] = i.key;
      if (i.itemName) { byName[i.itemName] = i.key; }
      if (i.itemCode && i.itemName) byName[`${i.itemCode} - ${i.itemName}`] = i.key;
    });

    // Phase 2: Try reports for quantities
    status.textContent = 'Fetching quantity data from reports…';
    let qtyResult = await fetchInventoryQtyFromReports(byCode, byName, msg => { status.textContent = msg; });
    bar.style.width = '80%';

    if (qtyResult && qtyResult.matched > 0) {
      applyQtyMap(qtyResult.qtyMap);
      _qtySource = qtyResult.source;
      showInfoBar(`✓ Quantities loaded from: ${qtyResult.source} · ${qtyResult.matched} items matched`, 'ok');
    } else {
      // Phase 3: Fallback — fetch item details via self links
      status.textContent = 'Fetching quantities via item self-links (fallback)…';
      qtyResult = await fetchInventoryQtyFromItemDetail(msg => { status.textContent = msg; });
      if (qtyResult && qtyResult.matched > 0) {
        applyQtyMap(qtyResult.qtyMap);
        _qtySource = qtyResult.source;
        showInfoBar(`✓ Quantities from: ${qtyResult.source} · ${qtyResult.matched} items`, 'ok');
      } else {
        showInfoBar(
          `⚠ Could not fetch quantity data automatically. Click "🔬 Discover Reports" to find the correct data source, then click "▶ Fetch this report" next to the Inventory Quantity Summary report.`,
          'warn'
        );
      }
    }

    bar.style.width = '100%';
    const qtyHits = _raw.filter(i => i.qtyOnHand !== null || i.qtyOwned !== null).length;
    status.textContent = `✓ ${_raw.length.toLocaleString()} items · qty: ${qtyHits}/${_raw.length}`;

    btn.textContent = '↺ Reload'; btn.disabled = false;
    document.getElementById('disc-btn').disabled = false;
    ctrlIds.forEach(id => { const el=document.getElementById(id); if(el) el.disabled=false; });
    document.getElementById('tabs-container').style.display = 'block';

    _page = 1;
    applyFilters();

  } catch(err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry'; btn.disabled = false;
    document.getElementById('app-init').innerHTML =
      `<div class="err-box">⚠ ${esc(err.message)}<br><small>Make sure this is running inside Manager.io</small></div>`;
  }
}

/* ══════════════════════════════════
   Filters & Sort
══════════════════════════════════ */
function toggleF(key) {
  _filters[key] = !_filters[key];
  document.getElementById('f-'+key)?.classList.toggle('on', _filters[key]);
  _page = 1; applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('search-input')?.value ?? '').trim().toLowerCase();
  const sk = document.getElementById('sort-select')?.value ?? 'name-asc';

  let list = _raw.filter(i => {
    if (_filters.active  && i.inactive) return false;
    if (_filters.reorder && !i.reorderPoint) return false;
    if (_filters.hasdiv  && !i.division) return false;
    if (_filters.negqty  && !((i.qtyOnHand??0)<0 || (i.qtyOwned??0)<0)) return false;
    if (q && !(i.itemName.toLowerCase().includes(q)||(i.itemCode??'').toLowerCase().includes(q))) return false;
    return true;
  });

  list.sort((a,b) => {
    switch(sk) {
      case 'name-asc':       return a.itemName.localeCompare(b.itemName);
      case 'name-desc':      return b.itemName.localeCompare(a.itemName);
      case 'code-asc':       return (a.itemCode??'zzz').localeCompare(b.itemCode??'zzz');
      case 'qty-hand-desc':  return (b.qtyOnHand??-Infinity)-(a.qtyOnHand??-Infinity);
      case 'qty-owned-desc': return (b.qtyOwned??-Infinity)-(a.qtyOwned??-Infinity);
      case 'val-desc':       return (b.totalValue??-Infinity)-(a.totalValue??-Infinity);
      case 'sale-desc':      return (b.defSalePrice??-Infinity)-(a.defSalePrice??-Infinity);
      default:               return a.itemName.localeCompare(b.itemName);
    }
  });

  _filtered = list;
  renderStats();
  renderContent();
}

/* ══════════════════════════════════
   Stats
══════════════════════════════════ */
function renderStats() {
  const total    = _raw.length;
  const active   = _raw.filter(i=>!i.inactive).length;
  const reorder  = _raw.filter(i=>i.reorderPoint).length;
  const hasDivs  = _raw.filter(i=>i.division).length;
  const negQty   = _raw.filter(i=>(i.qtyOnHand??0)<0||(i.qtyOwned??0)<0).length;
  const totalVal = _raw.reduce((s,i)=>s+(i.totalValue??0),0);
  const totalOwn = _raw.reduce((s,i)=>s+(i.qtyOwned??0),0);

  const sg = document.getElementById('stats-grid');
  sg.style.display = 'grid';
  sg.innerHTML = [
    ['Total Items',    total,           'all records',           'var(--head)'],
    ['Active',         active,          `${total?Math.round(active/total*100):0}% of total`, 'var(--green)'],
    ['Total Qty Owned',num(totalOwn,0), 'sum all items',         'var(--teal)'],
    ['Total Value',    num(totalVal,0), 'inventory value sum',   'var(--accent)'],
    ['Reorder Set',    reorder,         'have reorder point',    'var(--amber)'],
    ['With Division',  hasDivs,         'have division',         'var(--purple)'],
    ['Showing',        _filtered.length,'after filters',         'var(--muted)'],
  ].map(([l,v,s,c])=>`
    <div class="stat-card">
      <div class="stat-label">${l}</div>
      <div class="stat-value" style="color:${c}">${typeof v==='number'?v.toLocaleString():v}</div>
      <div class="stat-sub">${s}</div>
    </div>`).join('');
}

/* ══════════════════════════════════
   Tabs
══════════════════════════════════ */
function switchTab(tab) {
  _tab = tab; _page = 1;
  const tabs = ['inventory','pricing','divisions','customfields','all'];
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', tabs[i]===tab));
  renderContent();
}
function renderContent() {
  switch(_tab) {
    case 'inventory':    renderInventoryTab();    break;
    case 'pricing':      renderPricingTab();      break;
    case 'divisions':    renderDivisionsTab();    break;
    case 'customfields': renderCFTab();           break;
    case 'all':          renderAllTab();          break;
  }
}

/* ══════════════════════════════════
   Pagination
══════════════════════════════════ */
function pageSlice() {
  const total = _filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if (_page > totalPages) _page = totalPages;
  const start = (_page-1)*PAGE_SIZE;
  return { items: _filtered.slice(start, start+PAGE_SIZE), start, total, totalPages };
}
function pgHTML(total, totalPages, start) {
  if (totalPages<=1 && total<=PAGE_SIZE) return '';
  const p=_page, mb=7;
  let ps=Math.max(1,p-3), pe=Math.min(totalPages,ps+mb-1);
  if(pe-ps<mb-1) ps=Math.max(1,pe-mb+1);
  let b='';
  if(ps>1) b+=`<button class="pg-btn" onclick="goPage(1)">1</button>${ps>2?'<span class="pg-dots">…</span>':''}`;
  for(let i=ps;i<=pe;i++) b+=`<button class="pg-btn${i===p?' cur':''}" onclick="goPage(${i})">${i}</button>`;
  if(pe<totalPages) b+=`${pe<totalPages-1?'<span class="pg-dots">…</span>':''}<button class="pg-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  return `<div class="pagination">
    <span>Rows ${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total.toLocaleString()}</span>
    <button class="pg-btn" onclick="goPage(${p-1})" ${p<=1?'disabled':''}>← Prev</button>
    ${b}
    <button class="pg-btn" onclick="goPage(${p+1})" ${p>=totalPages?'disabled':''}>Next →</button>
  </div>`;
}
function goPage(p) {
  const tp = Math.max(1, Math.ceil(_filtered.length/PAGE_SIZE));
  _page = Math.max(1, Math.min(p, tp));
  renderContent();
  document.getElementById('app')?.scrollIntoView({behavior:'smooth'});
}
function wrapTable(tbl, pag) {
  if (!_filtered.length) return `<div class="tbl-wrap"><div class="empty-state">
    <div class="icon">📭</div><div>${_raw.length?'No items match filters.':'No data loaded.'}</div>
  </div></div>`;
  return `<div class="tbl-wrap"><div class="tbl-scroll">${tbl}</div>${pag}</div>`;
}
let _lastGrp = '';
function maybeGrp(name, cols) {
  const sk = document.getElementById('sort-select')?.value ?? 'name-asc';
  if (sk !== 'name-asc') return '';
  const ch = (name||'?')[0].toUpperCase();
  const g  = /[A-Z]/.test(ch) ? ch : '#';
  if (g === _lastGrp) return '';
  _lastGrp = g;
  return `<tr class="grp-row"><td colspan="${cols}">— ${g} —</td></tr>`;
}
function divCell(d) {
  if (!d) return `<span class="td-dim">—</span>`;
  const code = d.code ? `<span class="div-code">(${esc(d.code)})</span>` : '';
  return `<span class="div-chip">${esc(d.name)}</span>${code}`;
}
function getCFCols(items, field) {
  const seen = new Map();
  items.forEach(i => Object.keys(i[field]??{}).forEach(k => { if(!seen.has(k)) seen.set(k, cfLabel(k)); }));
  return [...seen.entries()].map(([key,label]) => ({key,label}));
}

/* ══════════════════════════════════
   Tab: Inventory & Quantities
══════════════════════════════════ */
function renderInventoryTab() {
  const {items,start,total,totalPages} = pageSlice();
  _lastGrp = '';
  let tOwned=0, tHand=0, tDeliver=0, tReceive=0, tValue=0;
  let rows = '';

  items.forEach(i => {
    rows += maybeGrp(i.itemName, 11);
    tOwned   += i.qtyOwned    ?? 0;
    tHand    += i.qtyOnHand   ?? 0;
    tDeliver += i.qtyToDeliver ?? 0;
    tReceive += i.qtyToReceive ?? 0;
    tValue   += i.totalValue   ?? 0;

    const sb = i.inactive ? `<span class="badge b-inactive">Inactive</span>` : `<span class="badge b-active">Active</span>`;
    const rc = i.reorderPoint ? `<span class="badge b-reorder">✦ ${i.qtyDesired>0?num(i.qtyDesired,0):'Set'}</span>` : `<span class="td-dim">—</span>`;

    rows += `<tr>
      <td class="td-code">${i.itemCode?esc(i.itemCode):'<span class="td-dim">—</span>'}</td>
      <td class="td-name" title="${esc(i.itemName)}">${esc(i.itemName)}</td>
      <td class="td-unit">${i.unitName?esc(i.unitName):'<span class="td-dim">—</span>'}</td>
      <td class="td-num">${numCell(i.qtyOwned,2)}</td>
      <td class="td-num">${numCell(i.qtyOnHand,2)}</td>
      <td class="td-num">${numCell(i.qtyToDeliver,2)}</td>
      <td class="td-num">${numCell(i.qtyToReceive,2)}</td>
      <td class="td-num">${numCell(i.averageCost,4)}</td>
      <td class="td-num">${numCell(i.totalValue,2,true)}</td>
      <td>${rc}</td>
      <td>${sb}</td>
    </tr>`;
  });

  const foot = `<tfoot><tr>
    <td colspan="3" style="font-size:10px;color:var(--muted)">PAGE TOTALS — ${items.length} rows</td>
    <td class="td-num">${num(tOwned,2)}</td>
    <td class="td-num">${num(tHand,2)}</td>
    <td class="td-num">${num(tDeliver,2)}</td>
    <td class="td-num">${num(tReceive,2)}</td>
    <td></td>
    <td class="td-num" style="color:var(--green)">${num(tValue,2)}</td>
    <td colspan="2"></td>
  </tr></tfoot>`;

  const tbl = `<table>
    <thead>
      <tr class="cg-row">
        <th class="cg cg-id" colspan="3">Identification</th>
        <th class="cg cg-qty" colspan="4">Quantities</th>
        <th class="cg cg-val" colspan="2">Valuation</th>
        <th class="cg cg-misc" colspan="2">Status</th>
      </tr>
      <tr class="hdr-row">
        <th>Code</th><th>Item Name</th><th>Unit</th>
        <th class="r">Qty Owned</th><th class="r">Qty On Hand</th>
        <th class="r">Qty to Deliver</th><th class="r">Qty to Receive</th>
        <th class="r">Avg Cost</th><th class="r">Total Value</th>
        <th class="r">Reorder</th><th>Status</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>${foot}
  </table>`;
  document.getElementById('app').innerHTML = wrapTable(tbl, pgHTML(total,totalPages,start));
}

/* ══════════════════════════════════
   Tab: Custom Fields
══════════════════════════════════ */
function renderCFTab() {
  const {items,start,total,totalPages} = pageSlice();
  const strCols  = getCFCols(_filtered,'cfStrings');
  const decCols  = getCFCols(_filtered,'cfDecimals');
  const boolCols = getCFCols(_filtered,'cfBooleans');
  const dateCols = getCFCols(_filtered,'cfDates');
  const arrCols  = getCFCols(_filtered,'cfStringArrays');
  const cfCount  = strCols.length+decCols.length+boolCols.length+dateCols.length+arrCols.length;

  if (cfCount === 0) {
    document.getElementById('app').innerHTML = `<div class="tbl-wrap">
      <div class="empty-state"><div class="icon">🏷</div>
        <div>No custom field data found.</div>
      </div></div>`;
    return;
  }
  _lastGrp = '';
  const totalCols = 2 + cfCount;
  let rows = '';
  items.forEach(i => {
    rows += maybeGrp(i.itemName, totalCols);
    let cells = `
      <td class="td-code">${i.itemCode?esc(i.itemCode):'<span class="td-dim">—</span>'}</td>
      <td class="td-name" title="${esc(i.itemName)}">${esc(i.itemName)}</td>`;
    strCols.forEach(({key})  => { const v=i.cfStrings[key];      cells+=`<td class="cf-cell">${v!=null?esc(String(v)):'<span class="td-dim">—</span>'}</td>`; });
    decCols.forEach(({key})  => { const v=i.cfDecimals[key];     cells+=`<td class="td-num">${v!=null?num(Number(v),2):'<span class="td-dim">—</span>'}</td>`; });
    boolCols.forEach(({key}) => { const v=i.cfBooleans[key];     cells+=`<td style="text-align:center">${v!=null?(v?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--muted)">✗</span>'):'<span class="td-dim">—</span>'}</td>`; });
    dateCols.forEach(({key}) => { const v=i.cfDates[key];        cells+=`<td class="cf-cell">${v?esc(String(v)):'<span class="td-dim">—</span>'}</td>`; });
    arrCols.forEach(({key})  => { const v=i.cfStringArrays[key]; const d=Array.isArray(v)?v.join(', '):(v!=null?String(v):null); cells+=`<td class="cf-cell">${d?esc(d):'<span class="td-dim">—</span>'}</td>`; });
    rows += `<tr>${cells}</tr>`;
  });
  const cgRow = [
    `<th class="cg cg-id" colspan="2">Identification</th>`,
    strCols.length  ? `<th class="cg cg-cf" colspan="${strCols.length}">Text Fields</th>`    : '',
    decCols.length  ? `<th class="cg cg-cf" colspan="${decCols.length}">Number Fields</th>`  : '',
    boolCols.length ? `<th class="cg cg-cf" colspan="${boolCols.length}">Yes/No Fields</th>` : '',
    dateCols.length ? `<th class="cg cg-cf" colspan="${dateCols.length}">Date Fields</th>`   : '',
    arrCols.length  ? `<th class="cg cg-cf" colspan="${arrCols.length}">List Fields</th>`    : '',
  ].join('');
  const hdrRow = [`<th>Code</th><th>Item Name</th>`,
    ...strCols.map(c=>`<th>${esc(c.label)}</th>`),
    ...decCols.map(c=>`<th class="r">${esc(c.label)}</th>`),
    ...boolCols.map(c=>`<th style="text-align:center">${esc(c.label)}</th>`),
    ...dateCols.map(c=>`<th>${esc(c.label)}</th>`),
    ...arrCols.map(c=>`<th>${esc(c.label)}</th>`),
  ].join('');
  const tbl = `<table>
    <thead><tr class="cg-row">${cgRow}</tr><tr class="hdr-row">${hdrRow}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
  document.getElementById('app').innerHTML = wrapTable(tbl, pgHTML(total,totalPages,start));
}
