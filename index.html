<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventory Items — Full View</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f4f6f9;
  --surface:   #ffffff;
  --panel:     #ffffff;
  --border:    #dde2ea;
  --border2:   #c8d0dc;
  --accent:    #1d6fce;
  --accent-lt: #e8f1fb;
  --green:     #1a7f37;
  --green-lt:  #e6f4ea;
  --red:       #cf222e;
  --red-lt:    #ffeef0;
  --amber:     #9a6700;
  --amber-lt:  #fff8c5;
  --purple:    #6639ba;
  --purple-lt: #ede8ff;
  --teal:      #0e7490;
  --teal-lt:   #e0f2f7;
  --muted:     #8391a4;
  --text:      #1c2635;
  --text-dim:  #57657a;
  --head:      #0d1b2a;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Plus Jakarta Sans', system-ui, sans-serif;
  --radius:    8px;
  --shadow:    0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
}

html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 14px;
  font-size: 13px;
}

/* ── Topbar ── */
.topbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 9px 14px; margin-bottom: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  position: sticky; top: 0; z-index: 200;
}
.brand {
  font-size: 13px; font-weight: 800; color: var(--accent);
  letter-spacing: .03em; white-space: nowrap;
}
.vsep { width: 1px; height: 20px; background: var(--border2); flex-shrink: 0; }

.load-btn {
  padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-family: var(--sans); font-size: 12px; font-weight: 700;
  background: var(--accent); color: #fff;
  transition: opacity .15s, transform .1s; white-space: nowrap;
}
.load-btn:hover:not(:disabled) { opacity: .87; transform: translateY(-1px); }
.load-btn:disabled { opacity: .42; cursor: not-allowed; }

.print-btn {
  padding: 7px 12px; border: 1px solid var(--border2); border-radius: 6px;
  background: transparent; color: var(--text-dim); font-family: var(--sans);
  font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s;
}
.print-btn:hover { background: var(--bg); }

.search-wrap { position: relative; min-width: 140px; max-width: 240px; flex: 1; }
.search-wrap input {
  width: 100%; padding: 6px 10px 6px 28px;
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text);
  font-family: var(--mono); font-size: 11px; outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.si { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--muted); pointer-events: none; }

.ctrl-sel {
  padding: 6px 8px; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: var(--sans);
  font-size: 11px; outline: none; cursor: pointer;
}
.fbtn {
  padding: 5px 10px; border: 1px solid var(--border2); border-radius: 6px;
  background: transparent; color: var(--text-dim); font-family: var(--sans);
  font-size: 11px; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.fbtn.on { background: var(--accent-lt); color: var(--accent); border-color: #90bdf0; font-weight: 700; }

.prog-wrap { flex: 1; min-width: 60px; max-width: 130px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-bar  { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width .25s; }
.status-txt { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }

/* ── Stats ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 9px; margin-bottom: 12px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 11px 13px; box-shadow: var(--shadow);
}
.stat-label { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 3px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--head); line-height: 1; }
.stat-sub   { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ── Tabs ── */
.tab-bar { display: flex; gap: 2px; border-bottom: 2px solid var(--border); }
.tab {
  padding: 8px 15px; font-size: 11px; font-weight: 700; cursor: pointer;
  color: var(--text-dim); border-radius: 6px 6px 0 0;
  transition: all .15s; white-space: nowrap;
  border: 1px solid transparent; border-bottom: none; margin-bottom: -2px;
}
.tab:hover { color: var(--accent); }
.tab.active {
  background: var(--surface); color: var(--accent);
  border-color: var(--border); border-bottom-color: var(--surface);
}

/* ── Table ── */
.tbl-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px;
}
.tbl-scroll { overflow-x: auto; max-height: calc(100vh - 290px); overflow-y: auto; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead { position: sticky; top: 0; z-index: 10; }

thead tr.cg-row { background: #edf1f7; }
th.cg {
  padding: 4px 10px 3px; font-size: 8px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .14em; text-align: center;
  border-bottom: 1px solid var(--border); border-right: 1px solid var(--border2);
}
th.cg:last-child { border-right: none; }
.cg-id   { color: #4a5a6e; }
.cg-qty  { color: #0e7490; background: #e0f6fb; }
.cg-val  { color: #1a7f37; background: #e6f4ea; }
.cg-pri  { color: #7a4f00; background: #fef9e7; }
.cg-div  { color: #6639ba; background: #ede8ff; }
.cg-cf   { color: #9a6700; background: #fff8c5; }
.cg-misc { color: #4a5a6e; }

thead tr.hdr-row { background: #f6f8fb; }
th {
  padding: 8px 10px; text-align: left;
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: .07em;
  border-bottom: 2px solid var(--border2);
  border-right: 1px solid #edf1f7;
  white-space: nowrap; cursor: pointer; user-select: none; transition: color .15s;
}
th:last-child { border-right: none; }
th:hover { color: var(--accent); }
th.r { text-align: right; }
th.c { text-align: center; }

tbody tr { border-bottom: 1px solid #edf1f7; transition: background .08s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f3f7ff; }

td {
  padding: 7px 10px; vertical-align: middle;
  border-right: 1px solid #f0f3f7;
}
td:last-child { border-right: none; }

.td-name { font-weight: 600; color: var(--head); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.td-code { font-family: var(--mono); font-size: 10px; color: var(--accent); white-space: nowrap; }
.td-unit { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.td-num  { font-family: var(--mono); font-size: 11px; text-align: right; }
.td-dim  { color: #b8c4d4; }
.td-na   { color: #c8d4e0; font-style: italic; font-size: 10px; }

.badge {
  display: inline-block; padding: 2px 7px; border-radius: 20px;
  font-size: 9px; font-weight: 700; letter-spacing: .04em; white-space: nowrap;
}
.b-active   { background: var(--green-lt);  color: var(--green);  border: 1px solid #aaddb8; }
.b-inactive { background: var(--red-lt);    color: var(--red);    border: 1px solid #ffbbbc; }
.b-val      { background: var(--accent-lt); color: var(--accent); border: 1px solid #a8ccf0; }
.b-div      { background: var(--purple-lt); color: var(--purple); border: 1px solid #c4aef5; }
.b-reorder  { background: var(--amber-lt);  color: var(--amber);  border: 1px solid #e8d060; }

.grp-row td {
  background: #eef2f9; font-size: 9px; font-weight: 800;
  color: var(--accent); text-transform: uppercase; letter-spacing: .16em;
  padding: 4px 10px; border-top: 1px solid var(--border2);
}

.div-chip {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 10px; background: var(--purple-lt); color: var(--purple);
  border: 1px solid #c4aef5; white-space: nowrap;
}
.div-code {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  margin-left: 4px;
}

.cf-cell { font-family: var(--mono); font-size: 10px; color: var(--text); }

.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 13px;
}
.empty-state .icon { font-size: 38px; margin-bottom: 10px; }
.err-box {
  color: var(--red); background: var(--red-lt);
  border: 1px solid #ffbbbc; border-radius: var(--radius);
  padding: 12px 16px; font-size: 12px; margin-bottom: 14px;
}

.pagination {
  display: flex; align-items: center; justify-content: flex-end; gap: 5px;
  padding: 9px 13px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); flex-wrap: wrap;
  background: #fafbfd;
}
.pg-btn {
  padding: 4px 9px; border: 1px solid var(--border2);
  border-radius: 5px; background: var(--surface); color: var(--text-dim);
  font-family: var(--sans); font-size: 11px; cursor: pointer; transition: all .15s;
}
.pg-btn:hover:not(:disabled) { background: var(--accent-lt); color: var(--accent); border-color: var(--accent); }
.pg-btn:disabled { opacity: .3; cursor: not-allowed; }
.pg-btn.cur { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
.pg-dots { color: var(--muted); }

/* loading overlay for meta fetch */
.meta-notice {
  font-family: var(--mono); font-size: 10px; color: var(--teal);
  background: var(--teal-lt); border: 1px solid #9ad8e8;
  border-radius: 5px; padding: 4px 10px; white-space: nowrap;
}

@media print {
  body { padding: 0; background: white; font-size: 10px; }
  .topbar, .tab-bar, .pagination, .stats-grid, .print-btn { display: none !important; }
  .tbl-wrap { box-shadow: none; border-radius: 0; border: none; }
  .tbl-scroll { max-height: none; overflow: visible; }
  table { font-size: 9px; }
  th, td { padding: 5px 7px; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── Control bar ── -->
<div class="topbar">
  <span class="brand">📦 Inventory Items</span>
  <div class="vsep"></div>
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <button class="print-btn" onclick="window.print()">🖨 Print</button>
  <span class="meta-notice" id="meta-notice" style="display:none">⏳ Loading field definitions…</span>

  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search-input" placeholder="Search name / code…" oninput="applyFilters()" disabled>
  </div>

  <select class="ctrl-sel" id="sort-select" onchange="applyFilters()" disabled>
    <option value="name-asc">Name A→Z</option>
    <option value="name-desc">Name Z→A</option>
    <option value="code-asc">Code A→Z</option>
    <option value="sale-desc">Sale Price ↓</option>
    <option value="purchase-desc">Purchase Price ↓</option>
    <option value="qty-desc">Qty Desired ↓</option>
  </select>

  <button class="fbtn" id="f-active"  onclick="toggleF('active')"  disabled>Active Only</button>
  <button class="fbtn" id="f-reorder" onclick="toggleF('reorder')" disabled>Reorder</button>
  <button class="fbtn" id="f-hasdiv"  onclick="toggleF('hasdiv')"  disabled>Has Division</button>
  <button class="fbtn" id="f-hascf"   onclick="toggleF('hascf')"   disabled>Has Custom Fields</button>

  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data</span>
</div>

<div class="stats-grid" id="stats-grid" style="display:none"></div>

<div id="tabs-container" style="display:none">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('inventory')">📊 Inventory &amp; Quantities</div>
    <div class="tab" onclick="switchTab('pricing')">💰 Pricing &amp; Valuation</div>
    <div class="tab" onclick="switchTab('divisions')">🏢 Divisions &amp; Accounts</div>
    <div class="tab" onclick="switchTab('customfields')">🏷 Custom Fields</div>
    <div class="tab" onclick="switchTab('all')">⚙ All Fields</div>
  </div>
  <div id="app"></div>
</div>

<div id="app-init"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getInventoryItemBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
   Manager.io returns ≤50 records per call.
   This loop follows next_page_token until
   every record is loaded.
══════════════════════════════════ */
async function getInventoryItemBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/inventory-item-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/inventory-item-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   fetchAllPages — generic paginator for metadata endpoints
   Used for custom field definitions, divisions, etc.
══════════════════════════════════ */
async function fetchAllPages(basePath) {
  const all = [];
  let nextToken = null;
  let pageNum = 0;
  do {
    const path = nextToken
      ? `${basePath}?next_page_token=${encodeURIComponent(nextToken)}`
      : basePath;
    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });
    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    all.push(...page);
    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;
    pageNum++;
    if (pageNum >= 100) break;
  } while (nextToken);
  return all;
}

/* ══════════════════════════════════
   State
══════════════════════════════════ */
let _raw      = [];
let _filtered = [];
let _page     = 1;
let _tab      = 'inventory';
const PAGE_SIZE = 50;
const _filters = { active: false, reorder: false, hasdiv: false, hascf: false };

// Metadata maps built at load time
// cfKeyToName: { [uuid_key]: "Human Field Name" }
// divKeyToName: { [uuid_key]: { name, code } }
let _cfKeyToName  = {};   // uuid → "Carton Size", "HS Code", etc.
let _divKeyToInfo = {};   // uuid → { name, code }

const VALUATION = { 1: 'Average Cost', 2: 'FIFO', 3: 'LIFO', 4: 'Specific ID' };

/* ══════════════════════════════════
   Helpers
══════════════════════════════════ */
const esc   = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const num   = (v, d=0) => v!=null ? Number(v).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}) : null;
const price = v => v!=null ? num(v,2) : null;
const dash  = () => `<span class="td-dim">—</span>`;
const na    = () => `<span class="td-na" title="Not available in inventory-item-batch endpoint">n/a</span>`;

/* Resolve a Manager reference object → display name */
function resolveName(val) {
  if (val == null) return null;
  if (typeof val === 'object') {
    // Check if this is a UUID key we have in our division lookup
    const key = val.key ?? val.id ?? val.uuid;
    if (key && _divKeyToInfo[key]) return _divKeyToInfo[key];
    return { name: val.name ?? val.text ?? val.nameWithCode ?? JSON.stringify(val), code: val.code ?? null };
  }
  // Plain string — could be a UUID
  if (typeof val === 'string' && _divKeyToInfo[val]) return _divKeyToInfo[val];
  return { name: String(val), code: null };
}

/* Get human CF column name from key UUID */
function cfLabel(key) {
  return _cfKeyToName[key] ?? _cfKeyToName[key?.toLowerCase()] ?? key;
}

/* ══════════════════════════════════
   fetchMetadata
   Loads custom field definitions and division list
   so we can display human names instead of UUIDs.
   Manager endpoints tried:
     /api4/text-custom-field-batch       → Text CFs (like "Carton Size")
     /api4/number-custom-field-batch     → Numeric CFs
     /api4/date-custom-field-batch       → Date CFs
     /api4/checkbox-custom-field-batch   → Boolean CFs
     /api4/division-batch                → Divisions (name + code)
══════════════════════════════════ */
async function fetchMetadata() {
  document.getElementById('meta-notice').style.display = 'inline-block';

  const cfEndpoints = [
    '/api4/text-custom-field-batch',
    '/api4/number-custom-field-batch',
    '/api4/date-custom-field-batch',
    '/api4/checkbox-custom-field-batch',
    '/api4/dropdown-custom-field-batch',
  ];

  // Fetch all CF types in parallel — silently ignore endpoints that don't exist
  const cfResults = await Promise.allSettled(cfEndpoints.map(ep => fetchAllPages(ep)));

  cfResults.forEach(result => {
    if (result.status !== 'fulfilled') return;
    const items = result.value;
    items.forEach(row => {
      // Each row is { key: uuid, item: { name: "Carton Size", ... } } or similar
      const key  = row?.key ?? row?.item?.key;
      const name = row?.item?.name ?? row?.item?.fieldName ?? row?.name;
      if (key && name) {
        _cfKeyToName[key] = name;
        _cfKeyToName[key.toLowerCase()] = name;
      }
    });
  });

  // Fetch divisions
  try {
    const divItems = await fetchAllPages('/api4/division-batch');
    divItems.forEach(row => {
      const key  = row?.key ?? row?.item?.key;
      const name = row?.item?.name ?? row?.name;
      const code = row?.item?.code ?? row?.code;
      if (key && name) {
        _divKeyToInfo[key] = { name, code };
        _divKeyToInfo[key.toLowerCase()] = { name, code };
      }
    });
  } catch(e) {
    // Division endpoint optional
  }

  document.getElementById('meta-notice').style.display = 'none';
}

/* ══════════════════════════════════
   Normalize raw API record → flat object
══════════════════════════════════ */
function normalize(raw) {
  const it  = raw?.item ?? raw;
  const cf2 = it?.customFields2 ?? {};

  const cfStrings      = cf2.strings      ?? {};
  const cfDecimals     = cf2.decimals     ?? {};
  const cfDates        = cf2.dates        ?? {};
  const cfBooleans     = cf2.booleans     ?? {};
  const cfStringArrays = cf2.stringArrays ?? {};

  const hasCF = !!(
    Object.keys(cfStrings).length ||
    Object.keys(cfDecimals).length ||
    Object.keys(cfDates).length ||
    Object.keys(cfBooleans).length ||
    Object.keys(cfStringArrays).length
  );

  // Resolve division — could be UUID string, object, or null
  const divRaw  = it?.division;
  const defDivRaw = it?.hasDefaultDivision ? it?.defaultDivision : null;

  // If divRaw is a plain UUID string, look it up in our map
  // If it's an object with .key, look that up
  // If it's an object with .name directly, use that
  function resolveDiv(val) {
    if (val == null) return null;
    if (typeof val === 'string') {
      return _divKeyToInfo[val] ?? _divKeyToInfo[val.toLowerCase()] ?? { name: val, code: null };
    }
    if (typeof val === 'object') {
      const key = val.key ?? val.id;
      if (key && _divKeyToInfo[key]) return _divKeyToInfo[key];
      if (key && _divKeyToInfo[key?.toLowerCase()]) return _divKeyToInfo[key.toLowerCase()];
      return { name: val.name ?? val.text ?? JSON.stringify(val), code: val.code ?? null };
    }
    return null;
  }

  return {
    key:             raw?.key ?? null,
    itemCode:        it?.itemCode   ?? null,
    itemName:        it?.itemName   ?? it?.nameWithCode ?? it?.text ?? '(Unnamed)',
    unitName:        it?.unitName   ?? null,
    valuationMethod: it?.valuationMethod ?? null,
    inactive:        it?.inactive   ?? false,
    reorderPoint:    it?.reorderPoint ?? false,
    qtyDesired:      it?.qtyDesired ?? 0,

    // Inventory quantities
    qtyOwned:        it?.qtyOwned       ?? it?.quantityOwned      ?? null,
    qtyOnHand:       it?.qtyOnHand      ?? it?.quantityOnHand     ?? null,
    qtyToDeliver:    it?.qtyToDeliver   ?? it?.quantityToDeliver  ?? null,
    qtyToReceive:    it?.qtyToReceive   ?? it?.quantityToReceive  ?? null,
    averageCost:     it?.averageCost    ?? it?.unitCost           ??
                     (it?.obsolete_StartingBalanceAverageCost2 > 0
                       ? it.obsolete_StartingBalanceAverageCost2 : null),
    totalValue:      it?.totalValue     ?? it?.inventoryValue     ?? null,

    // Pricing
    defPurchasePrice: it?.hasDefaultPurchaseUnitPrice ? (it?.defaultPurchaseUnitPrice ?? 0) : null,
    defSalePrice:     it?.hasDefaultSalesUnitPrice    ? (it?.defaultSalesUnitPrice    ?? 0) : null,
    defaultQty:       it?.hasDefaultQty ? (it?.defaultQty ?? 0) : null,
    defaultLineDesc:  it?.hasDefaultLineDescription ? it?.defaultLineDescription : null,

    // Division — fully resolved to { name, code } or null
    division:        resolveDiv(divRaw),
    defaultDivision: resolveDiv(defDivRaw),
    divisionEnabled: it?.divisionEnabled ?? false,

    // Accounts
    incomeAccountName:  it?.customIncomeAccount  ? resolveName(it?.incomeAccount)?.name  : null,
    expenseAccountName: it?.customExpenseAccount ? resolveName(it?.expenseAccount)?.name : null,
    controlAccountName: resolveName(it?.controlAccount)?.name ?? null,

    // Custom fields raw maps
    cfStrings, cfDecimals, cfDates, cfBooleans, cfStringArrays,
    hasCF,

    // Category from inventory list view
    category: it?.category ?? null,
    hsCode:   it?.hsCode   ?? null,
  };
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true; btn.textContent = 'Loading…';
  bar.style.width = '0%';
  document.getElementById('app-init').innerHTML = '';
  document.getElementById('stats-grid').style.display = 'none';
  document.getElementById('tabs-container').style.display = 'none';

  const ctrlIds = ['search-input','sort-select','f-active','f-reorder','f-hasdiv','f-hascf'];
  ctrlIds.forEach(id => { const el=document.getElementById(id); if(el) el.disabled=true; });

  try {
    // Step 1: fetch CF definitions + divisions in parallel with items
    status.textContent = 'Fetching field definitions…';
    const [rawItems] = await Promise.all([
      getInventoryItemBatch((loaded, total, page) => {
        status.textContent = total
          ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()}`
          : `Page ${page} · ${loaded.toLocaleString()} records…`;
        if (total) bar.style.width = Math.min(85, Math.round(loaded/total*100)) + '%';
      }),
      fetchMetadata(),
    ]);

    bar.style.width = '100%';
    status.textContent = `✓ ${rawItems.length.toLocaleString()} records loaded`;
    btn.textContent = '↺ Reload'; btn.disabled = false;

    ctrlIds.forEach(id => { const el=document.getElementById(id); if(el) el.disabled=false; });
    document.getElementById('tabs-container').style.display = 'block';

    _raw = rawItems.map(normalize);
    _page = 1;
    applyFilters();

  } catch(err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry'; btn.disabled = false;
    document.getElementById('app-init').innerHTML =
      `<div class="err-box">⚠ ${esc(err.message)}<br><small>Make sure this is running inside Manager.io</small></div>`;
  }
}

/* ══════════════════════════════════
   Filters & sort
══════════════════════════════════ */
function toggleF(key) {
  _filters[key] = !_filters[key];
  document.getElementById('f-'+key)?.classList.toggle('on', _filters[key]);
  _page = 1; applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('search-input')?.value ?? '').trim().toLowerCase();
  const sortKey = document.getElementById('sort-select')?.value ?? 'name-asc';

  let list = _raw.filter(i => {
    if (_filters.active  && i.inactive) return false;
    if (_filters.reorder && !i.reorderPoint) return false;
    if (_filters.hasdiv  && !i.division) return false;
    if (_filters.hascf   && !i.hasCF) return false;
    if (q && !(i.itemName.toLowerCase().includes(q) || (i.itemCode??'').toLowerCase().includes(q))) return false;
    return true;
  });

  list.sort((a,b) => {
    switch(sortKey) {
      case 'name-asc':      return a.itemName.localeCompare(b.itemName);
      case 'name-desc':     return b.itemName.localeCompare(a.itemName);
      case 'code-asc':      return (a.itemCode??'zzz').localeCompare(b.itemCode??'zzz');
      case 'sale-desc':     return (b.defSalePrice??-Infinity)-(a.defSalePrice??-Infinity);
      case 'purchase-desc': return (b.defPurchasePrice??-Infinity)-(a.defPurchasePrice??-Infinity);
      case 'qty-desc':      return (b.qtyDesired??0)-(a.qtyDesired??0);
      default:              return a.itemName.localeCompare(b.itemName);
    }
  });

  _filtered = list;
  renderStats();
  renderContent();
}

/* ══════════════════════════════════
   Stats
══════════════════════════════════ */
function renderStats() {
  const total   = _raw.length;
  const active  = _raw.filter(i=>!i.inactive).length;
  const reorder = _raw.filter(i=>i.reorderPoint).length;
  const hasDivs = _raw.filter(i=>i.division).length;
  const hasCFs  = _raw.filter(i=>i.hasCF).length;
  const sg = document.getElementById('stats-grid');
  sg.style.display = 'grid';
  sg.innerHTML = [
    ['Total Items',   total,           'all records',        'var(--head)'],
    ['Active',        active,          `${total?Math.round(active/total*100):0}% of total`,'var(--green)'],
    ['Inactive',      total-active,    'hidden from use',    'var(--red)'],
    ['Reorder Set',   reorder,         'have reorder point', 'var(--amber)'],
    ['With Division', hasDivs,         'have division',      'var(--purple)'],
    ['Custom Fields', hasCFs,          'have CF data',       'var(--teal)'],
    ['Showing',       _filtered.length,'after filters',      'var(--accent)'],
  ].map(([l,v,s,c])=>`
    <div class="stat-card">
      <div class="stat-label">${l}</div>
      <div class="stat-value" style="color:${c}">${Number(v).toLocaleString()}</div>
      <div class="stat-sub">${s}</div>
    </div>`).join('');
}

══════════════════════════════════ */
function switchTab(tab) {
  _tab = tab; _page = 1;
  const tabs = ['inventory','pricing','divisions','customfields','all'];
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', tabs[i]===tab));

  switch(_tab) {
    case 'inventory':    renderInventoryTab();    break;

/* ══════════════════════════════════
   Pagination
══════════════════════════════════ */
function pageSlice() {
  const total = _filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if (_page > totalPages) _page = totalPages;
  const start = (_page-1)*PAGE_SIZE;
  return { items: _filtered.slice(start, start+PAGE_SIZE), start, total, totalPages };
}
function pgHTML(total, totalPages, start) {
  if (totalPages<=1 && total<=PAGE_SIZE) return '';
  const p=_page, mb=7;
  let ps=Math.max(1,p-3), pe=Math.min(totalPages,ps+mb-1);
  if(pe-ps<mb-1) ps=Math.max(1,pe-mb+1);
  let b='';
  if(ps>1) b+=`<button class="pg-btn" onclick="goPage(1)">1</button>${ps>2?'<span class="pg-dots">…</span>':''}`;
  for(let i=ps;i<=pe;i++) b+=`<button class="pg-btn${i===p?' cur':''}" onclick="goPage(${i})">${i}</button>`;
  if(pe<totalPages) b+=`${pe<totalPages-1?'<span class="pg-dots">…</span>':''}<button class="pg-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  return `<div class="pagination">
    <span>Rows ${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total.toLocaleString()}</span>
    <button class="pg-btn" onclick="goPage(${p-1})" ${p<=1?'disabled':''}>← Prev</button>
    ${b}
    <button class="pg-btn" onclick="goPage(${p+1})" ${p>=totalPages?'disabled':''}>Next →</button>
  </div>`;
}
function goPage(p) {
  const tp = Math.max(1, Math.ceil(_filtered.length/PAGE_SIZE));
  _page = Math.max(1, Math.min(p, tp));
  renderContent();
  document.getElementById('app')?.scrollIntoView({behavior:'smooth'});
}
function wrapTable(tbl, pag) {
  if (!_filtered.length) return `<div class="tbl-wrap"><div class="empty-state">
    <div class="icon">📭</div>
    <div>${_raw.length?'No items match your filters.':'No data loaded.'}</div>
  </div></div>`;
  return `<div class="tbl-wrap"><div class="tbl-scroll">${tbl}</div>${pag}</div>`;
}

let _lastGrp = '';
function maybeGrp(name, cols) {
  const sk = document.getElementById('sort-select')?.value ?? 'name-asc';
  if (sk !== 'name-asc') return '';
  const ch = (name||'?')[0].toUpperCase();
  const g  = /[A-Z]/.test(ch) ? ch : '#';
  if (g === _lastGrp) return '';
  _lastGrp = g;
  return `<tr class="grp-row"><td colspan="${cols}">— ${g} —</td></tr>`;
}

/* Division cell helper */
function divCell(divInfo) {
  if (!divInfo) return dash();
  const label = esc(divInfo.name);
  const code  = divInfo.code ? `<span class="div-code">(${esc(divInfo.code)})</span>` : '';
  return `<span class="div-chip">${label}</span>${code}`;
}

/* ══════════════════════════════════
   Collect CF column definitions from filtered data
   Returns [{ key, label, type }] for each CF type
══════════════════════════════════ */
function getCFCols(items, cfField) {
  const seen = new Map();
  items.forEach(i => {
    Object.keys(i[cfField]??{}).forEach(k => {
      if (!seen.has(k)) seen.set(k, cfLabel(k));
    });
  });
  return [...seen.entries()].map(([key,label]) => ({key, label}));
}

function renderCFTab() {
  const {items,start,total,totalPages} = pageSlice();

  // Build column lists with human labels
  const strCols  = getCFCols(_filtered, 'cfStrings');
  const decCols  = getCFCols(_filtered, 'cfDecimals');
  const boolCols = getCFCols(_filtered, 'cfBooleans');
  const dateCols = getCFCols(_filtered, 'cfDates');
  const arrCols  = getCFCols(_filtered, 'cfStringArrays');
  const cfCount  = strCols.length+decCols.length+boolCols.length+dateCols.length+arrCols.length;

  if (cfCount === 0) {
    document.getElementById('app').innerHTML = `<div class="tbl-wrap">
      <div class="empty-state"><div class="icon">🏷</div>
        <div>No custom field data found in loaded records.</div>
        <div style="font-size:11px;margin-top:6px;color:var(--muted)">
          Custom fields (like "Carton Size") appear here once items have<br>
          customFields2 data populated in Manager.
        </div>
      </div></div>`;
    return;
  }

  _lastGrp = '';
  const totalCols = 2+cfCount;
  let rows = '';
  items.forEach(i => {
    rows += maybeGrp(i.itemName, totalCols);
    let cells = `
      <td class="td-code">${i.itemCode?esc(i.itemCode):dash()}</td>
      <td class="td-name" title="${esc(i.itemName)}">${esc(i.itemName)}</td>`;
    strCols.forEach(({key}) => {
      const v = i.cfStrings[key];
      cells += `<td class="cf-cell">${v!=null?esc(String(v)):dash()}</td>`;
    });
    decCols.forEach(({key}) => {
      const v = i.cfDecimals[key];
      cells += `<td class="td-num">${v!=null?num(Number(v),2):dash()}</td>`;
    });
    boolCols.forEach(({key}) => {
      const v = i.cfBooleans[key];
      cells += `<td style="text-align:center">${v!=null?(v?`<span style="color:var(--green)">✓</span>`:`<span style="color:var(--muted)">✗</span>`):dash()}</td>`;
    });
    dateCols.forEach(({key}) => {
      const v = i.cfDates[key];
      cells += `<td class="cf-cell">${v?esc(String(v)):dash()}</td>`;
    });
    arrCols.forEach(({key}) => {
      const v = i.cfStringArrays[key];
      const d = Array.isArray(v)?v.join(', '):(v!=null?String(v):null);
      cells += `<td class="cf-cell">${d?esc(d):dash()}</td>`;
    });
    rows += `<tr>${cells}</tr>`;
  });

  // Column group header
  const cgRow = [
    `<th class="cg cg-id" colspan="2">Identification</th>`,
    strCols.length  ? `<th class="cg cg-cf" colspan="${strCols.length}">Text Fields</th>`    : '',
    decCols.length  ? `<th class="cg cg-cf" colspan="${decCols.length}">Number Fields</th>`  : '',
    boolCols.length ? `<th class="cg cg-cf" colspan="${boolCols.length}">Yes/No Fields</th>` : '',
    dateCols.length ? `<th class="cg cg-cf" colspan="${dateCols.length}">Date Fields</th>`   : '',
    arrCols.length  ? `<th class="cg cg-cf" colspan="${arrCols.length}">List Fields</th>`    : '',
  ].join('');

  // Human-label column headers (e.g. "Carton Size" not the UUID)
  const hdrRow = [
    `<th>Code</th><th>Item Name</th>`,
    ...strCols.map(c  => `<th>${esc(c.label)}</th>`),
    ...decCols.map(c  => `<th class="r">${esc(c.label)}</th>`),
    ...boolCols.map(c => `<th style="text-align:center">${esc(c.label)}</th>`),
    ...dateCols.map(c => `<th>${esc(c.label)}</th>`),
    ...arrCols.map(c  => `<th>${esc(c.label)}</th>`),
  ].join('');

  const tbl = `<table><thead>
    <tr class="cg-row">${cgRow}</tr>
    <tr class="hdr-row">${hdrRow}</tr>
  </thead><tbody>${rows}</tbody></table>`;
  document.getElementById('app').innerHTML = wrapTable(tbl, pgHTML(total,totalPages,start));
}

      <th class="r">Purchase</th><th class="r">Sale</th>
      <th>Division</th><th>Default Div.</th>
      <th class="r">Reorder</th>
    </tr>
  </thead><tbody>${rows}</tbody></table>`;
  document.getElementById('app').innerHTML = wrapTable(tbl, pgHTML(total,totalPages,start));
}

/* ══════════════════════════════════
   render — entry point
══════════════════════════════════ */
function render(items) {
  _raw = items.map(normalize);
  _page = 1;
  applyFilters();
}
</script>
